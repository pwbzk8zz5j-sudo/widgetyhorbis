
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Control de equipo</title>
  <style>
    :root{
      --bg:#0b0a0f;
      --panel:#14111a;
      --panel-2:#1b1722;
      --text:#f7f4fb;
      --muted:#a79fad;
      --purple:#a855f7;
      --purple-2:#7c3aed;
      --purple-soft:#dabaff;
      --green:#8be0bc;
      --red:#ff8f9f;
      --border:rgba(255,255,255,.09);
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      min-height:100%;
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:transparent;
      color:var(--text);
    }

    body{
      padding:8px;
      display:grid;
      place-items:center;
    }

    .widget{
      width:min(100%,1100px);
      border-radius:24px;
      border:1px solid var(--border);
      background:
        radial-gradient(circle at 86% 12%,rgba(168,85,247,.17),transparent 26%),
        linear-gradient(145deg,var(--panel),var(--bg));
      box-shadow:0 18px 50px rgba(0,0,0,.28);
      overflow:hidden;
      position:relative;
    }

    .topbar{
      min-height:52px;
      padding:14px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      border-bottom:1px solid var(--border);
      background:rgba(255,255,255,.018);
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }

    .brand-mark{
      width:30px;
      height:30px;
      border-radius:10px;
      display:grid;
      place-items:center;
      background:linear-gradient(135deg,rgba(124,58,237,.28),rgba(168,85,247,.16));
      border:1px solid rgba(216,180,254,.16);
      box-shadow:inset 0 0 18px rgba(168,85,247,.08);
      flex:0 0 auto;
    }

    .brand-text{
      min-width:0;
    }

    .eyebrow{
      color:var(--purple-soft);
      font-size:10px;
      font-weight:850;
      letter-spacing:.15em;
      text-transform:uppercase;
      margin-bottom:2px;
    }

    h1{
      margin:0;
      font-size:17px;
      line-height:1.1;
      letter-spacing:-.02em;
      white-space:nowrap;
    }

    .status-pill{
      flex:0 0 auto;
      padding:7px 10px;
      border-radius:999px;
      background:rgba(139,224,188,.09);
      border:1px solid rgba(139,224,188,.18);
      color:var(--green);
      font-size:11px;
      font-weight:850;
      white-space:nowrap;
    }

    .content{
      display:grid;
      grid-template-columns:.9fr 1.35fr;
      min-height:170px;
    }

    .section{
      padding:18px;
      position:relative;
    }

    .section + .section{
      border-left:1px solid var(--border);
    }

    .section-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:14px;
    }

    .section-title{
      display:flex;
      align-items:center;
      gap:8px;
      font-size:13px;
      font-weight:850;
    }

    .tiny{
      color:var(--muted);
      font-size:10px;
      text-transform:uppercase;
      letter-spacing:.08em;
      font-weight:800;
    }

    .camera-check{
      min-height:91px;
      display:flex;
      align-items:center;
      gap:14px;
      padding:14px;
      border-radius:16px;
      background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.05);
      cursor:pointer;
      user-select:none;
      transition:transform .18s ease,background .18s ease,border-color .18s ease;
    }

    .camera-check:hover{
      transform:translateY(-1px);
      background:rgba(168,85,247,.07);
      border-color:rgba(216,180,254,.13);
    }

    .camera-icon{
      width:54px;
      height:40px;
      position:relative;
      flex:0 0 auto;
    }

    .camera-body{
      position:absolute;
      left:2px;
      top:8px;
      width:40px;
      height:28px;
      border-radius:8px;
      background:linear-gradient(145deg,#2c2634,#17131d);
      border:1px solid rgba(216,180,254,.15);
    }

    .camera-body::before{
      content:"";
      position:absolute;
      left:7px;
      top:-7px;
      width:15px;
      height:7px;
      border-radius:4px 4px 2px 2px;
      background:#241f2b;
      border:1px solid rgba(216,180,254,.12);
    }

    .lens{
      position:absolute;
      width:25px;
      height:25px;
      border-radius:50%;
      right:1px;
      top:10px;
      background:radial-gradient(circle at 38% 35%,#c7a3ea 0 8%,#573772 9% 20%,#16121c 21% 52%,#09080c 53%);
      border:3px solid #2b2432;
      box-shadow:0 0 14px rgba(168,85,247,.14);
    }

    .check-copy{
      min-width:0;
      flex:1;
    }

    .check-copy strong{
      display:block;
      font-size:14px;
      margin-bottom:3px;
    }

    .check-copy span{
      display:block;
      color:var(--muted);
      font-size:11px;
    }

    .check-box{
      width:28px;
      height:28px;
      border-radius:9px;
      display:grid;
      place-items:center;
      border:1px solid rgba(216,180,254,.22);
      background:rgba(255,255,255,.025);
      color:transparent;
      font-weight:900;
      flex:0 0 auto;
      transition:background .2s ease,color .2s ease;
    }

    .camera-check.done .check-box{
      color:var(--purple-soft);
      background:rgba(168,85,247,.18);
    }

    .audio-layout{
      display:grid;
      grid-template-columns:1fr auto;
      gap:16px;
      align-items:center;
    }

    .count-wrap{
      display:flex;
      align-items:end;
      gap:8px;
      margin-bottom:10px;
    }

    .count{
      font-size:38px;
      font-weight:950;
      letter-spacing:-.05em;
      line-height:.9;
    }

    .count small{
      font-size:13px;
      color:var(--muted);
      font-weight:750;
      letter-spacing:0;
    }

    .cells{
      display:flex;
      gap:7px;
      margin-bottom:10px;
    }

    .cell{
      height:14px;
      flex:1;
      min-width:36px;
      border-radius:999px;
      border:1px solid rgba(216,180,254,.16);
      background:rgba(255,255,255,.035);
      transition:background .25s ease,box-shadow .25s ease;
    }

    .cell.used{
      background:linear-gradient(90deg,var(--purple-2),var(--purple));
      box-shadow:0 0 12px rgba(168,85,247,.2);
    }

    .alert{
      min-height:18px;
      color:var(--muted);
      font-size:11px;
      margin-bottom:12px;
    }

    .alert.hot{
      color:var(--red);
      font-weight:850;
    }

    .buttons{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    button{
      appearance:none;
      border:none;
      border-radius:12px;
      padding:10px 13px;
      font-weight:850;
      cursor:pointer;
      font-size:12px;
      transition:transform .18s ease,opacity .18s ease;
    }

    button:hover{transform:translateY(-1px)}
    button:active{transform:scale(.98)}

    .primary{
      color:white;
      background:linear-gradient(135deg,var(--purple-2),var(--purple));
      box-shadow:0 9px 20px rgba(124,58,237,.20);
    }

    .secondary{
      color:var(--muted);
      background:rgba(255,255,255,.045);
      border:1px solid var(--border);
    }

    .charge{
      display:none;
      color:#251126;
      background:linear-gradient(135deg,#f3c7ff,#c99cff);
      box-shadow:0 10px 22px rgba(216,180,254,.16);
    }

    .charge.visible{display:inline-flex}

    .receiver{
      width:150px;
      height:74px;
      border-radius:15px;
      position:relative;
      background:
        linear-gradient(145deg,rgba(168,85,247,.12),rgba(255,255,255,.02)),
        #19151f;
      border:1px solid rgba(216,180,254,.18);
      box-shadow:0 14px 23px rgba(0,0,0,.22);
      flex:0 0 auto;
    }

    .screen{
      position:absolute;
      left:13px;
      top:14px;
      width:74px;
      height:42px;
      border-radius:8px;
      padding:7px;
      background:#0b0910;
      border:1px solid rgba(216,180,254,.11);
    }

    .screen-top{
      display:flex;
      justify-content:space-between;
      color:var(--purple-soft);
      font-size:7px;
      font-weight:850;
      letter-spacing:.08em;
    }

    .levels{
      display:flex;
      align-items:end;
      gap:3px;
      height:18px;
      margin-top:4px;
    }

    .levels i{
      width:4px;
      display:block;
      border-radius:3px;
      background:linear-gradient(var(--purple-soft),var(--purple));
      animation:level 1.3s ease-in-out infinite alternate;
    }

    .levels i:nth-child(1){height:7px}
    .levels i:nth-child(2){height:13px;animation-delay:.2s}
    .levels i:nth-child(3){height:10px;animation-delay:.4s}
    .levels i:nth-child(4){height:16px;animation-delay:.1s}
    .levels i:nth-child(5){height:11px;animation-delay:.3s}
    .levels i:nth-child(6){height:14px;animation-delay:.5s}

    .knobs{
      position:absolute;
      right:12px;
      top:18px;
      display:grid;
      grid-template-columns:repeat(2,22px);
      gap:7px;
    }

    .knob{
      width:22px;
      height:22px;
      border-radius:50%;
      background:radial-gradient(circle at 35% 35%,#4a4056,#211b28 60%);
      border:1px solid rgba(255,255,255,.06);
      box-shadow:inset -3px -3px 6px rgba(0,0,0,.25);
    }

    .antenna{
      position:absolute;
      width:4px;
      height:34px;
      border-radius:999px;
      background:#2a2431;
      right:19px;
      top:-27px;
      transform:rotate(8deg);
      transform-origin:bottom;
    }

    .toast{
      position:absolute;
      left:50%;
      bottom:12px;
      transform:translate(-50%,10px);
      opacity:0;
      pointer-events:none;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(17,14,23,.94);
      border:1px solid rgba(216,180,254,.15);
      color:var(--purple-soft);
      font-size:11px;
      font-weight:850;
      transition:opacity .22s ease,transform .22s ease;
      z-index:5;
    }

    .toast.show{
      opacity:1;
      transform:translate(-50%,0);
    }

    @keyframes level{
      to{transform:scaleY(.55);opacity:.65}
    }

    @media(max-width:760px){
      .content{grid-template-columns:1fr}
      .section + .section{
        border-left:none;
        border-top:1px solid var(--border);
      }
      .audio-layout{
        grid-template-columns:1fr;
      }
      .receiver{
        display:none;
      }
      .topbar{
        align-items:flex-start;
      }
      .status-pill{
        margin-top:2px;
      }
    }
  </style>
</head>
<body>
  <main class="widget">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">🎬</div>
        <div class="brand-text">
          <div class="eyebrow">Pre-flight check</div>
          <h1>Control de equipo</h1>
        </div>
      </div>
      <div class="status-pill" id="topStatus">Equipo listo</div>
    </header>

    <section class="content">
      <article class="section">
        <div class="section-head">
          <div class="section-title">📷 Cámara</div>
          <div class="tiny">Checklist</div>
        </div>

        <div class="camera-check" id="cameraCheck" role="button" tabindex="0">
          <div class="camera-icon" aria-hidden="true">
            <div class="camera-body"></div>
            <div class="lens"></div>
          </div>

          <div class="check-copy">
            <strong>Batería cargada</strong>
            <span>Márcalo antes de salir.</span>
          </div>

          <div class="check-box">✓</div>
        </div>
      </article>

      <article class="section">
        <div class="section-head">
          <div class="section-title">🎚️ Audio inalámbrico</div>
          <div class="tiny">Carga cada 5 usos</div>
        </div>

        <div class="audio-layout">
          <div>
            <div class="count-wrap">
              <div class="count"><span id="count">0</span><small> / 5 usos</small></div>
            </div>

            <div class="cells">
              <span class="cell"></span>
              <span class="cell"></span>
              <span class="cell"></span>
              <span class="cell"></span>
              <span class="cell"></span>
            </div>

            <div class="alert" id="alert">Quedan 5 usos antes de cargar.</div>

            <div class="buttons" id="normalButtons">
              <button class="primary" id="addUse">+ Registrar uso</button>
              <button class="secondary" id="undoUse" title="Restar un uso">− Deshacer</button>
            </div>

            <button class="charge" id="chargedButton">🔋 Ya lo cargué</button>
          </div>

          <div class="receiver" aria-hidden="true">
            <div class="antenna"></div>
            <div class="screen">
              <div class="screen-top">
                <span>REC</span>
                <span>2.4G</span>
              </div>
              <div class="levels">
                <i></i><i></i><i></i><i></i><i></i><i></i>
              </div>
            </div>
            <div class="knobs">
              <div class="knob"></div>
              <div class="knob"></div>
              <div class="knob"></div>
              <div class="knob"></div>
            </div>
          </div>
        </div>
      </article>
    </section>

    <div class="toast" id="toast">Uso registrado</div>
  </main>

  <script>
    const KEY_USES = "film_audio_uses_v1";
    const KEY_CAMERA = "film_camera_ready_v1";

    const countEl = document.getElementById("count");
    const cells = [...document.querySelectorAll(".cell")];
    const alertEl = document.getElementById("alert");
    const addUse = document.getElementById("addUse");
    const undoUse = document.getElementById("undoUse");
    const chargedButton = document.getElementById("chargedButton");
    const normalButtons = document.getElementById("normalButtons");
    const cameraCheck = document.getElementById("cameraCheck");
    const toast = document.getElementById("toast");
    const topStatus = document.getElementById("topStatus");

    let uses = Math.max(0, Math.min(5, Number(localStorage.getItem(KEY_USES) || 0)));
    let cameraReady = localStorage.getItem(KEY_CAMERA) === "true";

    function showToast(text){
      toast.textContent = text;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 1500);
    }

    function setStatus(text, type){
      topStatus.textContent = text;

      if(type === "danger"){
        topStatus.style.color = "var(--red)";
        topStatus.style.borderColor = "rgba(255,143,159,.2)";
        topStatus.style.background = "rgba(255,143,159,.08)";
      }else if(type === "ready"){
        topStatus.style.color = "var(--green)";
        topStatus.style.borderColor = "rgba(139,224,188,.18)";
        topStatus.style.background = "rgba(139,224,188,.09)";
      }else{
        topStatus.style.color = "var(--purple-soft)";
        topStatus.style.borderColor = "rgba(216,180,254,.18)";
        topStatus.style.background = "rgba(168,85,247,.08)";
      }
    }

    function render(){
      countEl.textContent = uses;

      cells.forEach((cell,index) => {
        cell.classList.toggle("used", index < uses);
      });

      cameraCheck.classList.toggle("done", cameraReady);

      if(uses >= 5){
        alertEl.textContent = "Carga necesaria antes del próximo uso.";
        alertEl.classList.add("hot");
        normalButtons.style.display = "none";
        chargedButton.classList.add("visible");
        setStatus("Carga pendiente","danger");
      }else{
        const remaining = 5 - uses;
        alertEl.textContent = remaining === 1
          ? "Queda 1 uso antes de cargar."
          : `Quedan ${remaining} usos antes de cargar.`;

        alertEl.classList.remove("hot");
        normalButtons.style.display = "flex";
        chargedButton.classList.remove("visible");

        if(cameraReady){
          setStatus("Equipo listo","ready");
        }else{
          setStatus("Revisa la cámara","pending");
        }
      }

      localStorage.setItem(KEY_USES,String(uses));
      localStorage.setItem(KEY_CAMERA,String(cameraReady));
    }

    addUse.addEventListener("click",() => {
      if(uses < 5){
        uses++;
        showToast(uses === 5 ? "Hora de cargar el audio" : "Uso registrado");
        render();
      }
    });

    undoUse.addEventListener("click",() => {
      if(uses > 0){
        uses--;
        showToast("Último uso eliminado");
        render();
      }
    });

    chargedButton.addEventListener("click",() => {
      uses = 0;
      showToast("Contador reiniciado");
      render();
    });

    function toggleCamera(){
      cameraReady = !cameraReady;
      showToast(cameraReady ? "Cámara lista" : "Cámara pendiente");
      render();
    }

    cameraCheck.addEventListener("click",toggleCamera);
    cameraCheck.addEventListener("keydown",event => {
      if(event.key === "Enter" || event.key === " "){
        event.preventDefault();
        toggleCamera();
      }
    });

    render();
  </script>
</body>
</html>
