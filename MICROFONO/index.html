<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Control de equipo</title>
  <style>
    :root{
      --bg:#0a0910;
      --panel:#15121d;
      --panel-2:#1b1725;
      --text:#f7f3fb;
      --muted:#aaa1b7;
      --purple:#a855f7;
      --purple-2:#7c3aed;
      --purple-soft:#d8b4fe;
      --green:#8be0bc;
      --red:#ff8f9f;
      --border:rgba(255,255,255,.09);
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      min-height:100%;
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:transparent;
      color:var(--text);
    }

    body{
      padding:10px;
      display:grid;
      place-items:center;
    }

    .widget{
      width:min(100%,760px);
      padding:24px;
      border-radius:28px;
      border:1px solid var(--border);
      overflow:hidden;
      position:relative;
      background:
        radial-gradient(circle at 86% 10%,rgba(168,85,247,.20),transparent 30%),
        radial-gradient(circle at 10% 95%,rgba(124,58,237,.12),transparent 28%),
        linear-gradient(145deg,var(--panel),var(--bg));
      box-shadow:0 18px 50px rgba(0,0,0,.30);
    }

    .widget::after{
      content:"";
      position:absolute;
      width:220px;
      height:220px;
      right:-80px;
      bottom:-100px;
      border-radius:50%;
      background:rgba(168,85,247,.10);
      filter:blur(30px);
      pointer-events:none;
    }

    .head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:16px;
      margin-bottom:20px;
      position:relative;
      z-index:2;
    }

    .eyebrow{
      color:var(--purple-soft);
      font-size:12px;
      font-weight:850;
      letter-spacing:.11em;
      text-transform:uppercase;
      margin-bottom:7px;
    }

    h1{
      margin:0;
      font-size:clamp(26px,4vw,40px);
      line-height:1.05;
      letter-spacing:-.04em;
    }

    .subtitle{
      margin-top:8px;
      color:var(--muted);
      font-size:14px;
      line-height:1.5;
    }

    .status-pill{
      flex:0 0 auto;
      padding:8px 11px;
      border-radius:999px;
      background:rgba(139,224,188,.09);
      border:1px solid rgba(139,224,188,.18);
      color:var(--green);
      font-size:12px;
      font-weight:800;
      white-space:nowrap;
    }

    .grid{
      display:grid;
      grid-template-columns:.9fr 1.25fr;
      gap:14px;
      position:relative;
      z-index:2;
    }

    .card{
      border:1px solid var(--border);
      border-radius:20px;
      background:rgba(255,255,255,.035);
      padding:18px;
      min-height:240px;
    }

    .card-title{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:16px;
    }

    .card-title h2{
      margin:0;
      font-size:16px;
      letter-spacing:-.02em;
    }

    .tiny{
      color:var(--muted);
      font-size:12px;
    }

    .camera-visual{
      width:120px;
      height:82px;
      margin:14px auto 20px;
      position:relative;
      filter:drop-shadow(0 14px 20px rgba(0,0,0,.25));
    }

    .cam-body{
      position:absolute;
      left:8px;
      top:17px;
      width:84px;
      height:56px;
      border-radius:11px;
      background:linear-gradient(145deg,#2a2435,#17131e);
      border:1px solid rgba(216,180,254,.18);
    }

    .cam-body::before{
      content:"";
      position:absolute;
      width:28px;
      height:14px;
      border-radius:6px 6px 2px 2px;
      left:12px;
      top:-11px;
      background:#241f2d;
      border:1px solid rgba(216,180,254,.14);
    }

    .lens{
      position:absolute;
      width:46px;
      height:46px;
      border-radius:50%;
      left:57px;
      top:22px;
      background:
        radial-gradient(circle at 38% 35%,#b991df 0 7%,#51346e 8% 18%,#17131e 19% 48%,#0d0b11 49%);
      border:4px solid #2b2534;
      box-shadow:0 0 0 1px rgba(216,180,254,.15),0 0 22px rgba(168,85,247,.15);
    }

    .rec-dot{
      position:absolute;
      left:20px;
      top:31px;
      width:8px;
      height:8px;
      border-radius:50%;
      background:#ff7d92;
      box-shadow:0 0 12px rgba(255,125,146,.55);
    }

    .check-row{
      display:flex;
      align-items:center;
      gap:10px;
      padding:12px;
      border-radius:14px;
      background:rgba(255,255,255,.035);
      cursor:pointer;
      user-select:none;
      transition:background .2s ease,transform .2s ease;
    }

    .check-row:hover{
      background:rgba(168,85,247,.08);
      transform:translateY(-1px);
    }

    .box{
      width:23px;
      height:23px;
      border-radius:7px;
      display:grid;
      place-items:center;
      border:1px solid rgba(216,180,254,.25);
      color:transparent;
      font-weight:900;
      background:rgba(255,255,255,.03);
    }

    .check-row.done .box{
      background:rgba(168,85,247,.18);
      color:var(--purple-soft);
    }

    .check-row strong{
      display:block;
      font-size:14px;
    }

    .check-row span{
      display:block;
      color:var(--muted);
      font-size:12px;
      margin-top:2px;
    }

    .audio-device{
      height:112px;
      margin:2px 0 16px;
      position:relative;
      display:grid;
      place-items:center;
    }

    .receiver{
      position:relative;
      width:210px;
      height:82px;
      border-radius:16px;
      background:
        linear-gradient(145deg,rgba(168,85,247,.13),rgba(255,255,255,.02)),
        #191520;
      border:1px solid rgba(216,180,254,.20);
      box-shadow:0 16px 25px rgba(0,0,0,.22),inset 0 0 0 1px rgba(255,255,255,.02);
    }

    .receiver::before{
      content:"";
      position:absolute;
      width:38px;
      height:9px;
      border-radius:8px 8px 2px 2px;
      left:18px;
      top:-9px;
      background:#241f2d;
      border:1px solid rgba(216,180,254,.12);
    }

    .screen{
      position:absolute;
      left:16px;
      top:16px;
      width:94px;
      height:48px;
      border-radius:9px;
      padding:8px;
      background:#0c0a10;
      border:1px solid rgba(216,180,254,.12);
      box-shadow:inset 0 0 16px rgba(168,85,247,.08);
    }

    .screen-top{
      display:flex;
      justify-content:space-between;
      color:var(--purple-soft);
      font-size:9px;
      font-weight:800;
      letter-spacing:.07em;
    }

    .levels{
      display:flex;
      gap:3px;
      align-items:end;
      height:21px;
      margin-top:4px;
    }

    .levels i{
      display:block;
      width:5px;
      border-radius:4px;
      background:linear-gradient(var(--purple-soft),var(--purple));
      animation:level 1.4s ease-in-out infinite alternate;
    }

    .levels i:nth-child(1){height:8px}
    .levels i:nth-child(2){height:15px;animation-delay:.2s}
    .levels i:nth-child(3){height:11px;animation-delay:.4s}
    .levels i:nth-child(4){height:19px;animation-delay:.1s}
    .levels i:nth-child(5){height:13px;animation-delay:.3s}
    .levels i:nth-child(6){height:17px;animation-delay:.5s}

    .controls{
      position:absolute;
      right:17px;
      top:18px;
      display:grid;
      grid-template-columns:repeat(2,30px);
      gap:8px;
    }

    .knob{
      width:30px;
      height:30px;
      border-radius:50%;
      background:radial-gradient(circle at 35% 35%,#4b405a,#201a28 58%);
      border:1px solid rgba(255,255,255,.07);
      box-shadow:inset -4px -4px 8px rgba(0,0,0,.25);
    }

    .antenna{
      position:absolute;
      width:5px;
      height:42px;
      border-radius:999px;
      background:#2a2433;
      right:24px;
      top:-32px;
      transform:rotate(8deg);
      transform-origin:bottom;
    }

    .usage{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      margin-bottom:12px;
    }

    .count{
      font-size:28px;
      font-weight:900;
      letter-spacing:-.04em;
    }

    .count small{
      font-size:13px;
      color:var(--muted);
      font-weight:700;
      letter-spacing:0;
    }

    .cells{
      display:flex;
      gap:6px;
      flex:1;
      justify-content:flex-end;
    }

    .cell{
      width:30px;
      height:12px;
      border-radius:999px;
      border:1px solid rgba(216,180,254,.18);
      background:rgba(255,255,255,.035);
      transition:background .25s ease,box-shadow .25s ease;
    }

    .cell.used{
      background:linear-gradient(90deg,var(--purple-2),var(--purple));
      box-shadow:0 0 12px rgba(168,85,247,.22);
    }

    .alert{
      min-height:20px;
      color:var(--muted);
      font-size:12px;
      margin-bottom:12px;
    }

    .alert.hot{
      color:var(--red);
      font-weight:800;
    }

    .buttons{
      display:grid;
      grid-template-columns:1fr auto;
      gap:10px;
    }

    button{
      appearance:none;
      border:none;
      border-radius:14px;
      padding:12px 14px;
      font-weight:850;
      cursor:pointer;
      font-size:13px;
      transition:transform .18s ease,opacity .18s ease,background .18s ease;
    }

    button:hover{transform:translateY(-1px)}
    button:active{transform:translateY(0) scale(.98)}

    .primary{
      color:white;
      background:linear-gradient(135deg,var(--purple-2),var(--purple));
      box-shadow:0 10px 22px rgba(124,58,237,.22);
    }

    .secondary{
      color:var(--muted);
      background:rgba(255,255,255,.045);
      border:1px solid var(--border);
    }

    .primary:disabled{
      opacity:.45;
      cursor:not-allowed;
      box-shadow:none;
    }

    .charge{
      display:none;
      width:100%;
      color:#201322;
      background:linear-gradient(135deg,#f3c7ff,#c99cff);
      box-shadow:0 10px 24px rgba(216,180,254,.18);
    }

    .charge.visible{display:block}

    .toast{
      position:absolute;
      left:50%;
      bottom:15px;
      transform:translate(-50%,10px);
      opacity:0;
      pointer-events:none;
      padding:9px 13px;
      border-radius:999px;
      background:rgba(17,14,23,.92);
      border:1px solid rgba(216,180,254,.16);
      color:var(--purple-soft);
      font-size:12px;
      font-weight:800;
      transition:opacity .22s ease,transform .22s ease;
      z-index:5;
    }

    .toast.show{
      opacity:1;
      transform:translate(-50%,0);
    }

    @keyframes level{
      to{transform:scaleY(.55);opacity:.65}
    }

    @media(max-width:680px){
      .grid{grid-template-columns:1fr}
      .head{flex-direction:column}
      .status-pill{align-self:flex-start}
      .card{min-height:auto}
    }
  </style>
</head>
<body>
  <main class="widget">
    <div class="head">
      <div>
        <div class="eyebrow">🎬 Antes de grabar</div>
        <h1>Control de equipo</h1>
        <div class="subtitle">Dos clics y listo. Sin escribir nada.</div>
      </div>
      <div class="status-pill" id="topStatus">Equipo listo</div>
    </div>

    <section class="grid">
      <article class="card">
        <div class="card-title">
          <h2>📷 Cámara</h2>
          <span class="tiny">Checklist</span>
        </div>

        <div class="camera-visual" aria-hidden="true">
          <div class="cam-body"></div>
          <div class="lens"></div>
          <div class="rec-dot"></div>
        </div>

        <div class="check-row" id="cameraCheck" role="button" tabindex="0">
          <div class="box">✓</div>
          <div>
            <strong>Batería cargada</strong>
            <span>Márcalo antes de salir.</span>
          </div>
        </div>
      </article>

      <article class="card">
        <div class="card-title">
          <h2>🎚️ Audio inalámbrico</h2>
          <span class="tiny">Cada 5 usos</span>
        </div>

        <div class="audio-device" aria-hidden="true">
          <div class="receiver">
            <div class="antenna"></div>
            <div class="screen">
              <div class="screen-top">
                <span>REC</span>
                <span>2.4G</span>
              </div>
              <div class="levels">
                <i></i><i></i><i></i><i></i><i></i><i></i>
              </div>
            </div>
            <div class="controls">
              <div class="knob"></div>
              <div class="knob"></div>
              <div class="knob"></div>
              <div class="knob"></div>
            </div>
          </div>
        </div>

        <div class="usage">
          <div class="count"><span id="count">0</span><small> / 5 usos</small></div>
          <div class="cells" id="cells">
            <span class="cell"></span>
            <span class="cell"></span>
            <span class="cell"></span>
            <span class="cell"></span>
            <span class="cell"></span>
          </div>
        </div>

        <div class="alert" id="alert">Todavía no necesita carga.</div>

        <div class="buttons" id="normalButtons">
          <button class="primary" id="addUse">+ Registrar uso</button>
          <button class="secondary" id="undoUse" title="Restar un uso">−</button>
        </div>

        <button class="charge" id="chargedButton">🔋 Ya lo cargué</button>
      </article>
    </section>

    <div class="toast" id="toast">Uso registrado</div>
  </main>

  <script>
    const KEY_USES = "film_audio_uses_v1";
    const KEY_CAMERA = "film_camera_ready_v1";

    const countEl = document.getElementById("count");
    const cells = [...document.querySelectorAll(".cell")];
    const alertEl = document.getElementById("alert");
    const addUse = document.getElementById("addUse");
    const undoUse = document.getElementById("undoUse");
    const chargedButton = document.getElementById("chargedButton");
    const normalButtons = document.getElementById("normalButtons");
    const cameraCheck = document.getElementById("cameraCheck");
    const toast = document.getElementById("toast");
    const topStatus = document.getElementById("topStatus");

    let uses = Math.max(0, Math.min(5, Number(localStorage.getItem(KEY_USES) || 0)));
    let cameraReady = localStorage.getItem(KEY_CAMERA) === "true";

    function showToast(text){
      toast.textContent = text;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 1500);
    }

    function render(){
      countEl.textContent = uses;

      cells.forEach((cell,index) => {
        cell.classList.toggle("used", index < uses);
      });

      cameraCheck.classList.toggle("done", cameraReady);

      if(uses >= 5){
        alertEl.textContent = "Carga necesaria antes del próximo uso.";
        alertEl.classList.add("hot");
        normalButtons.style.display = "none";
        chargedButton.classList.add("visible");
        topStatus.textContent = "Carga pendiente";
        topStatus.style.color = "var(--red)";
        topStatus.style.borderColor = "rgba(255,143,159,.2)";
        topStatus.style.background = "rgba(255,143,159,.08)";
      }else{
        const remaining = 5 - uses;
        alertEl.textContent = remaining === 1
          ? "Queda 1 uso antes de cargar."
          : `Quedan ${remaining} usos antes de cargar.`;
        alertEl.classList.remove("hot");
        normalButtons.style.display = "grid";
        chargedButton.classList.remove("visible");
        topStatus.textContent = cameraReady ? "Equipo listo" : "Revisa la cámara";
        topStatus.style.color = cameraReady ? "var(--green)" : "var(--purple-soft)";
        topStatus.style.borderColor = cameraReady
          ? "rgba(139,224,188,.18)"
          : "rgba(216,180,254,.18)";
        topStatus.style.background = cameraReady
          ? "rgba(139,224,188,.09)"
          : "rgba(168,85,247,.08)";
      }

      localStorage.setItem(KEY_USES,String(uses));
      localStorage.setItem(KEY_CAMERA,String(cameraReady));
    }

    addUse.addEventListener("click",() => {
      if(uses < 5){
        uses++;
        showToast(uses === 5 ? "Hora de cargar el audio" : "Uso registrado");
        render();
      }
    });

    undoUse.addEventListener("click",() => {
      if(uses > 0){
        uses--;
        showToast("Último uso eliminado");
        render();
      }
    });

    chargedButton.addEventListener("click",() => {
      uses = 0;
      showToast("Contador reiniciado");
      render();
    });

    function toggleCamera(){
      cameraReady = !cameraReady;
      showToast(cameraReady ? "Cámara lista" : "Cámara pendiente");
      render();
    }

    cameraCheck.addEventListener("click",toggleCamera);
    cameraCheck.addEventListener("keydown",event => {
      if(event.key === "Enter" || event.key === " "){
        event.preventDefault();
        toggleCamera();
      }
    });

    render();
  </script>
</body>
</html>
