<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Yhorbis OS — Saludo</title>
  <style>
    :root{
      --bg:#0b0a0f;
      --card:#15131c;
      --card-2:#1c1826;
      --text:#f6f3fb;
      --muted:#a9a3b3;
      --accent:#a855f7;
      --accent-2:#7c3aed;
      --border:rgba(255,255,255,.09);
    }
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:transparent;color:var(--text)}
    body{padding:16px}
    .hero{
      position:relative;
      overflow:hidden;
      min-height:260px;
      padding:30px;
      border:1px solid var(--border);
      border-radius:24px;
      background:
        radial-gradient(circle at 85% 20%, rgba(168,85,247,.28), transparent 36%),
        radial-gradient(circle at 12% 90%, rgba(124,58,237,.18), transparent 32%),
        linear-gradient(145deg,var(--card),var(--bg));
      box-shadow:0 18px 50px rgba(0,0,0,.35);
    }
    .eyebrow{
      display:inline-flex;
      gap:8px;
      align-items:center;
      padding:7px 11px;
      border-radius:999px;
      background:rgba(168,85,247,.12);
      color:#d8b4fe;
      font-size:13px;
      font-weight:700;
      letter-spacing:.04em;
      text-transform:uppercase;
    }
    h1{font-size:clamp(34px,7vw,64px);line-height:1.02;margin:22px 0 10px;letter-spacing:-.04em}
    .name{color:var(--accent)}
    .date{font-size:16px;color:var(--muted);margin-bottom:24px}
    .quote{
      max-width:720px;
      padding:18px 20px;
      border:1px solid var(--border);
      border-radius:18px;
      background:rgba(255,255,255,.035);
      backdrop-filter:blur(10px);
    }
    .quote-label{color:#d8b4fe;font-size:13px;font-weight:700;margin-bottom:8px}
    .quote-text{font-size:18px;line-height:1.55}
    .clock{
      position:absolute;right:28px;top:26px;
      font-variant-numeric:tabular-nums;
      font-size:18px;color:var(--muted)
    }
    .footer{margin-top:14px;color:#777180;font-size:12px;text-align:right}
    @media(max-width:640px){
      body{padding:8px}
      .hero{padding:22px;min-height:300px}
      .clock{position:static;margin-top:12px}
      h1{margin-top:18px}
    }
  </style>
</head>
<body>
  <main class="hero">
    <div class="eyebrow">💜 Yhorbis OS</div>
    <div class="clock" id="clock"></div>
    <h1><span id="greeting">Buenas noches</span>,<br><span class="name">Yhorbis</span> <span id="emoji">🌙</span></h1>
    <div class="date" id="date"></div>

    <section class="quote">
      <div class="quote-label">💌 Mensaje de Yaiza</div>
      <div class="quote-text" id="message"></div>
    </section>

    <div class="footer">Menos caos. Más crear.</div>
  </main>

  <script>
    // EDITA AQUÍ TUS MENSAJITOS.
    // Puedes añadir cuantos quieras, siempre entre comillas y separados por comas.
    const mensajes = [
      "Mi amor, estoy muy orgullosa de ti. Hoy no tienes que hacerlo todo, solo empezar por una cosa 💛",
      "Confío mucho en ti y en todo lo que estás construyendo. Te amo ❤️",
      "Respira, toma agua y sigue a tu ritmo. No estás llegando tarde a tu propia vida 💜",
      "Lo que haces tiene valor, incluso cuando todavía no se ve terminado ✨",
      "Hoy también cuenta. Un pequeño avance sigue siendo avance 🫶"
    ];

    function saludoPorHora(hora){
      if (hora < 5) return ["¿Todavía despierto?", "🌙"];
      if (hora < 12) return ["Buenos días", "☀️"];
      if (hora < 19) return ["Buenas tardes", "🌤️"];
      return ["Buenas noches", "🌙"];
    }

    function mensajeDelDia(){
      const inicio = new Date(new Date().getFullYear(), 0, 0);
      const hoy = new Date();
      const dias = Math.floor((hoy - inicio) / 86400000);
      return mensajes[dias % mensajes.length];
    }

    function actualizar(){
      const ahora = new Date();
      const [saludo, emoji] = saludoPorHora(ahora.getHours());

      document.getElementById("greeting").textContent = saludo;
      document.getElementById("emoji").textContent = emoji;
      document.getElementById("message").textContent = mensajeDelDia();

      document.getElementById("date").textContent =
        ahora.toLocaleDateString("es-PE", {
          weekday:"long", day:"numeric", month:"long", year:"numeric"
        }).replace(/^./, c => c.toUpperCase());

      document.getElementById("clock").textContent =
        ahora.toLocaleTimeString("es-PE", {
          hour:"2-digit", minute:"2-digit", second:"2-digit"
        });
    }

    actualizar();
    setInterval(actualizar, 1000);
  </script>
</body>
</html>
