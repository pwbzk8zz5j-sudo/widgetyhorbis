
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Un recordatorio</title>
  <style>
    :root{
      --bg:#0f0c18;
      --panel:#171225;
      --panel-2:#1b1530;
      --border:rgba(170,130,255,.14);
      --text:#f7f2ff;
      --muted:#b9add2;
      --purple:#8b5cf6;
      --purple-2:#a879ff;
      --purple-3:#6d3fe0;
      --track:rgba(255,255,255,.075);
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      min-height:100%;
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:transparent;
      color:var(--text);
    }

    body{
      padding:8px;
    }

    .widget{
      width:100%;
      max-width:720px;
      margin:auto;
      padding:10px;
      border:1px solid var(--border);
      border-radius:18px;
      background:
        radial-gradient(circle at 12% 10%, rgba(139,92,246,.12), transparent 28%),
        linear-gradient(145deg, rgba(20,15,33,.98), rgba(14,11,24,.98));
      box-shadow:0 16px 38px rgba(0,0,0,.22);
      overflow:hidden;
    }

    .reminder,
    .card{
      border:1px solid var(--border);
      background:
        radial-gradient(circle at 92% 10%, rgba(139,92,246,.10), transparent 24%),
        linear-gradient(145deg, rgba(28,22,46,.95), rgba(19,15,33,.95));
      border-radius:15px;
    }

    .reminder{
      position:relative;
      padding:15px 48px 15px 16px;
      min-height:94px;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .label{
      display:flex;
      align-items:center;
      gap:8px;
      font-size:11px;
      line-height:1;
      font-weight:800;
      letter-spacing:.09em;
      text-transform:uppercase;
      color:#c4b5fd;
    }

    .reminder-text{
      margin-top:12px;
      font-size:18px;
      line-height:1.35;
      font-weight:650;
      letter-spacing:-.015em;
      max-width:52ch;
      transition:opacity .25s ease, transform .25s ease;
    }

    .reminder-text.fade{
      opacity:0;
      transform:translateY(4px);
    }

    .sparkles{
      position:absolute;
      right:16px;
      top:50%;
      transform:translateY(-50%);
      font-size:22px;
      color:var(--purple-2);
      opacity:.9;
      user-select:none;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:10px;
    }

    .card{
      min-height:132px;
      padding:15px 16px;
      position:relative;
      overflow:hidden;
    }

    .card::after{
      content:"";
      position:absolute;
      width:90px;
      height:90px;
      border-radius:50%;
      right:-36px;
      top:-36px;
      background:rgba(139,92,246,.10);
      pointer-events:none;
    }

    .metric-row{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:12px;
      margin-top:14px;
    }

    .big{
      font-size:42px;
      line-height:.95;
      font-weight:850;
      letter-spacing:-.05em;
      color:var(--purple-2);
    }

    .unit{
      font-size:18px;
      color:var(--muted);
      font-weight:700;
      margin-left:3px;
    }

    .sub{
      margin-top:10px;
      color:var(--muted);
      font-size:13px;
      line-height:1.35;
    }

    .progress-side{
      display:flex;
      align-items:center;
      gap:14px;
    }

    .ring{
      --p:0;
      width:76px;
      height:76px;
      border-radius:50%;
      background:
        radial-gradient(circle at center, var(--panel-2) 56%, transparent 57%),
        conic-gradient(var(--purple-2) calc(var(--p) * 1%), var(--track) 0);
      display:grid;
      place-items:center;
      flex:0 0 auto;
      box-shadow:inset 0 0 14px rgba(139,92,246,.08);
    }

    .ring span{
      font-size:16px;
      font-weight:800;
      color:var(--purple-2);
    }

    @media (max-width:560px){
      body{padding:4px}
      .widget{padding:8px;border-radius:15px}
      .reminder{min-height:84px;padding:13px 42px 13px 14px}
      .reminder-text{font-size:16px;margin-top:10px}
      .sparkles{right:13px;font-size:19px}
      .grid{gap:8px;margin-top:8px}
      .card{padding:13px;min-height:122px}
      .big{font-size:36px}
      .unit{font-size:16px}
      .ring{width:66px;height:66px}
      .ring span{font-size:14px}
    }

    @media (max-width:390px){
      .grid{grid-template-columns:1fr}
      .card{min-height:112px}
      .progress-side{justify-content:space-between}
    }
  </style>
</head>
<body>
  <main class="widget">
    <section class="reminder">
      <div class="label">💜 Un recordatorio</div>
      <div class="reminder-text" id="reminder"></div>
      <div class="sparkles">✦</div>
    </section>

    <section class="grid">
      <article class="card">
        <div class="label">🔥 Racha</div>
        <div class="metric-row">
          <div>
            <span class="big" id="streak">0</span>
            <span class="unit" id="streakUnit">días</span>
          </div>
        </div>
        <div class="sub" id="streakMessage"></div>
      </article>

      <article class="card">
        <div class="label">📈 Progreso semanal</div>
        <div class="metric-row progress-side">
          <div>
            <div>
              <span class="big" id="activeDays">0</span>
              <span class="unit">/7</span>
            </div>
            <div class="sub" id="progressMessage"></div>
          </div>

          <div class="ring" id="ring">
            <span id="percent">0%</span>
          </div>
        </div>
      </article>
    </section>
  </main>

  <script>
    const normalMessages = [
      "Amor, sigue concentrado. Yo sé que puedes con esto.",
      "Chambea un ratito más, amor. Ya después descansas.",
      "Estoy orgullosa de ti. Sigue avanzando a tu ritmo.",
      "Amor, una cosa a la vez. Tú puedes.",
      "Sigue concentrado, amor. Ya falta menos.",
      "Confía más en lo que haces. Yo confío muchísimo en ti.",
      "Hazlo con calma, pero no lo sueltes.",
      "Amor, termina esta parte primero y luego descansas.",
      "Estoy orgullosa de todo el esfuerzo que le metes.",
      "Sigue así, amor. Ya estás avanzando.",
      "Chambea tranquilo. Yo sé que va a quedar bonito.",
      "No te presiones tanto, amor. Solo sigue.",
      "Concéntrate un ratito más. Yo sé que puedes.",
      "Amor, avanza aunque sea un poquito. Todo cuenta.",
      "Te amo. Ahora sigue chambeando con calma."
    ];

    const specialMessages = [
      "Solo pasaba a decirte que te amo. Ahora sigue chambeando.",
      "Por si no te lo dije hoy: estoy muy orgullosa de ti.",
      "Te amo mucho. Sigue concentrado, amor.",
      "Confía un poquito más en ti. Yo sí confío muchísimo.",
      "Estoy de tu lado siempre, amor.",
      "Tú sigue avanzando. Yo sigo creyendo en ti.",
      "Gracias por todo el esfuerzo que haces.",
      "Ya quiero ver cómo queda. Sigue concentrado.",
      "Te amo. Hazlo a tu ritmo, pero sigue.",
      "Estoy muy orgullosa de ti, amor."
    ];

    const ACTIVITY_KEY = "recordatorio_activity_days_v2";
    const VISITS_KEY = "recordatorio_visit_count_v2";

    function dateKey(date = new Date()){
      const y = date.getFullYear();
      const m = String(date.getMonth()+1).padStart(2,"0");
      const d = String(date.getDate()).padStart(2,"0");
      return `${y}-${m}-${d}`;
    }

    function parseKey(key){
      const [y,m,d] = key.split("-").map(Number);
      return new Date(y,m-1,d);
    }

    function readDays(){
      try{
        return Array.from(
          new Set(JSON.parse(localStorage.getItem(ACTIVITY_KEY) || "[]"))
        ).sort();
      }catch{
        return [];
      }
    }

    function registerToday(){
      const days = readDays();
      const today = dateKey();

      if(!days.includes(today)){
        days.push(today);
        days.sort();
        localStorage.setItem(ACTIVITY_KEY, JSON.stringify(days));
      }

      return days;
    }

    function registerVisit(){
      const visits = Number(localStorage.getItem(VISITS_KEY) || "0") + 1;
      localStorage.setItem(VISITS_KEY, String(visits));
      return visits;
    }

    function getStreak(days){
      if(!days.length) return 0;

      const set = new Set(days);
      const cursor = new Date();
      let streak = 0;

      if(!set.has(dateKey(cursor))){
        cursor.setDate(cursor.getDate()-1);
      }

      while(set.has(dateKey(cursor))){
        streak++;
        cursor.setDate(cursor.getDate()-1);
      }

      return streak;
    }

    function weekStart(date){
      const result = new Date(date.getFullYear(),date.getMonth(),date.getDate());
      const day = result.getDay();
      result.setDate(result.getDate() + (day === 0 ? -6 : 1-day));
      return result;
    }

    function activeThisWeek(days){
      const start = weekStart(new Date());
      const end = new Date(start);
      end.setDate(start.getDate()+6);

      return days
        .map(parseKey)
        .filter(day => day >= start && day <= end)
        .length;
    }

    function dayOfYear(date){
      const start = new Date(date.getFullYear(),0,0);
      return Math.floor((date-start)/86400000);
    }

    function chooseMessage(visits){
      const special = visits % 7 === 0;

      if(special){
        return specialMessages[
          Math.floor(visits / 7) % specialMessages.length
        ];
      }

      return normalMessages[
        dayOfYear(new Date()) % normalMessages.length
      ];
    }

    function render(){
      const days = registerToday();
      const visits = registerVisit();
      const streak = getStreak(days);
      const active = activeThisWeek(days);
      const percent = Math.round((active/7)*100);

      const reminder = document.getElementById("reminder");
      reminder.classList.add("fade");

      setTimeout(() => {
        reminder.textContent = chooseMessage(visits);
        reminder.classList.remove("fade");
      }, 120);

      document.getElementById("streak").textContent = streak;
      document.getElementById("streakUnit").textContent =
        streak === 1 ? "día" : "días";

      document.getElementById("streakMessage").textContent =
        streak <= 1 ? "Ya empezaste. Ahora solo sigue." :
        streak < 4 ? "Vas agarrando ritmo, amor." :
        streak < 8 ? "Mira cómo sigues avanzando." :
        streak < 15 ? "Estoy orgullosa de tu constancia." :
        "Ya estás imparable.";

      document.getElementById("activeDays").textContent = active;
      document.getElementById("percent").textContent = percent + "%";
      document.getElementById("ring").style.setProperty("--p", percent);

      document.getElementById("progressMessage").textContent =
        active <= 1 ? "día activo" :
        active < 7 ? "días activos" :
        "semana completa";
    }

    render();
  </script>
</body>
</html>
