<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark" />
  <title>Saludo dinámico — Yhorbis</title>

  <style>
    :root{
      --text:#f7f2fb;
      --muted:#aaa0b4;
      --accent:#a855f7;
      --accent-2:#7c3aed;
      --accent-soft:#e0c4ff;
      --border:rgba(255,255,255,.09);
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      width:100%;
      min-height:100%;
      background:transparent!important;
      color:var(--text);
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }

    body{
      display:grid;
      place-items:center;
      padding:8px;
    }

    .hero{
      position:relative;
      isolation:isolate;
      overflow:hidden;
      width:min(100%,980px);
      min-height:190px;
      padding:25px 29px;
      border:1px solid var(--border);
      border-radius:25px;
      background:
        radial-gradient(circle at 86% 16%,rgba(168,85,247,.22),transparent 31%),
        radial-gradient(circle at 9% 100%,rgba(124,58,237,.13),transparent 30%),
        linear-gradient(145deg,rgba(20,16,27,.88),rgba(7,6,10,.92));
      box-shadow:
        0 18px 48px rgba(0,0,0,.34),
        inset 0 1px 0 rgba(255,255,255,.055);
      backdrop-filter:blur(22px) saturate(125%);
      -webkit-backdrop-filter:blur(22px) saturate(125%);
      transition:min-height .3s ease;
    }

    .hero::before{
      content:"";
      position:absolute;
      inset:0;
      z-index:-1;
      pointer-events:none;
      opacity:.32;
      background-image:
        linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),
        linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);
      background-size:32px 32px;
      mask-image:linear-gradient(90deg,black,transparent 80%);
      -webkit-mask-image:linear-gradient(90deg,black,transparent 80%);
    }

    .hero.sleep-mode{min-height:250px}

    .content{
      display:grid;
      grid-template-columns:minmax(0,1fr) auto;
      align-items:start;
      gap:28px;
    }

    .copy{min-width:0}

    h1{
      margin:0 0 10px;
      font-size:clamp(2.15rem,6.2vw,4.2rem);
      line-height:.98;
      letter-spacing:-.052em;
      text-wrap:balance;
    }

    .name{
      color:var(--accent-soft);
      text-shadow:0 0 22px rgba(168,85,247,.23);
    }

    .date{
      color:var(--muted);
      font-size:.9rem;
    }

    .clock{
      min-width:112px;
      color:#cbbad9;
      font-variant-numeric:tabular-nums;
      font-size:1.05rem;
      font-weight:720;
      text-align:right;
    }

    .sleep-note{
      display:none;
      max-width:680px;
      margin-top:21px;
      padding:13px 15px;
      border:1px solid rgba(224,196,255,.17);
      border-radius:15px;
      background:
        linear-gradient(145deg,rgba(168,85,247,.075),rgba(255,255,255,.023));
      box-shadow:inset 0 1px 0 rgba(255,255,255,.035);
      animation:appear .35s ease both;
    }

    .sleep-note.visible{display:block}

    .sleep-label{
      margin-bottom:6px;
      color:var(--accent-soft);
      font-size:.68rem;
      font-weight:820;
      letter-spacing:.11em;
      text-transform:uppercase;
    }

    .sleep-text{
      color:#eee7f4;
      font-size:.9rem;
      line-height:1.5;
    }

    .moon{
      position:absolute;
      right:17%;
      bottom:-42px;
      z-index:-1;
      width:135px;
      height:135px;
      border:1px solid rgba(224,196,255,.09);
      border-radius:50%;
      opacity:.48;
      box-shadow:
        0 0 0 24px rgba(168,85,247,.025),
        0 0 0 48px rgba(168,85,247,.015);
      animation:float 5.4s ease-in-out infinite;
    }

    .star{
      position:absolute;
      width:4px;
      height:4px;
      border-radius:50%;
      background:var(--accent-soft);
      box-shadow:0 0 10px rgba(224,196,255,.7);
      animation:twinkle 2.8s ease-in-out infinite;
    }

    .s1{right:10%;top:25%;animation-delay:.2s}
    .s2{right:22%;top:18%;animation-delay:1.1s}
    .s3{right:6%;bottom:24%;animation-delay:1.8s}

    @keyframes appear{
      from{opacity:0;transform:translateY(6px)}
      to{opacity:1;transform:translateY(0)}
    }

    @keyframes float{
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-8px)}
    }

    @keyframes twinkle{
      0%,100%{opacity:.2;transform:scale(.7)}
      50%{opacity:1;transform:scale(1.25)}
    }

    @media(max-width:640px){
      body{padding:6px}

      .hero{
        min-height:200px;
        padding:22px;
        border-radius:21px;
      }

      .hero.sleep-mode{min-height:275px}

      .content{
        grid-template-columns:1fr;
        gap:12px;
      }

      .clock{
        order:-1;
        min-width:0;
        text-align:left;
      }

      .moon{right:-18px}
    }

    @media(prefers-reduced-motion:reduce){
      .moon,.star,.sleep-note{animation:none}
    }
  </style>
</head>

<body>
  <main class="hero" id="hero" aria-live="polite">
    <span class="moon" aria-hidden="true"></span>
    <span class="star s1" aria-hidden="true"></span>
    <span class="star s2" aria-hidden="true"></span>
    <span class="star s3" aria-hidden="true"></span>

    <div class="content">
      <div class="copy">
        <h1>
          <span id="greeting">Buenas noches</span>,<br>
          <span class="name">Yhorbis</span> <span id="emoji">🌙</span>
        </h1>

        <div class="date" id="date"></div>
      </div>

      <div class="clock" id="clock"></div>
    </div>

    <section class="sleep-note" id="sleepNote">
      <div class="sleep-label">🌙 Hora de descansar</div>
      <div class="sleep-text" id="sleepMessage"></div>
    </section>
  </main>

  <script>
    const mensajesDormir = [
      "Amor... guarda el proyecto y ven a dormir. Mañana seguimos. 🤍",
      "El video puede esperar unas horas. Tú también necesitas descansar.",
      "Ya hiciste bastante por hoy. Mañana seguimos.",
      "No quiero que mañana andes como zombie. 🥺",
      "Descansar también es parte del trabajo.",
      "Te prometo que mañana todo saldrá mejor con sueño completo.",
      "Cinco minutos más... ya te conozco. 😂 Mejor ven a dormir.",
      "Tu cama te está extrañando.",
      "Guarda el proyecto antes de que Premiere haga de las suyas. 😭",
      "Yo ya te mandé a dormir. Ahora hazme caso. 💜"
    ];

    function saludoPorHora(hora, minutos){
      const horaDecimal = hora + (minutos / 60);

      if (horaDecimal >= 1 && horaDecimal < 5){
        if (horaDecimal >= 4.5){
          return ["¿Todavía despierto?", "😴"];
        }
        return ["¿Todavía despierto?", "🌙"];
      }

      if (hora < 12) return ["Buenos días", "☀️"];
      if (hora < 19) return ["Buenas tardes", "🌤️"];
      return ["Buenas noches", "🌙"];
    }

    function indiceDelDia(){
      const ahora = new Date();
      const inicio = new Date(ahora.getFullYear(), 0, 0);
      return Math.floor((ahora - inicio) / 86400000);
    }

    function mensajeParaDormir(ahora){
      const esDomingo = ahora.getDay() === 0;
      const horaDecimal = ahora.getHours() + (ahora.getMinutes() / 60);

      if (esDomingo && horaDecimal >= 3 && horaDecimal < 5){
        return "No sé qué haces despierto a esta hora... pero guarda el proyecto y ven a dormir conmigo. 🤍";
      }

      return mensajesDormir[indiceDelDia() % mensajesDormir.length];
    }

    function actualizar(){
      const ahora = new Date();
      const horaDecimal = ahora.getHours() + (ahora.getMinutes() / 60);
      const [saludo, emoji] = saludoPorHora(
        ahora.getHours(),
        ahora.getMinutes()
      );

      const mostrarMensajeDormir =
        horaDecimal >= 2.5 && horaDecimal < 5;

      document.getElementById("greeting").textContent = saludo;
      document.getElementById("emoji").textContent = emoji;

      document.getElementById("date").textContent =
        ahora.toLocaleDateString("es-PE", {
          weekday:"long",
          day:"numeric",
          month:"long",
          year:"numeric"
        }).replace(/^./, c => c.toUpperCase());

      document.getElementById("clock").textContent =
        ahora.toLocaleTimeString("es-PE", {
          hour:"2-digit",
          minute:"2-digit",
          second:"2-digit"
        });

      const sleepNote = document.getElementById("sleepNote");
      const hero = document.getElementById("hero");

      if (mostrarMensajeDormir){
        document.getElementById("sleepMessage").textContent =
          mensajeParaDormir(ahora);
        sleepNote.classList.add("visible");
        hero.classList.add("sleep-mode");
      }else{
        sleepNote.classList.remove("visible");
        hero.classList.remove("sleep-mode");
      }
    }

    actualizar();
    setInterval(actualizar, 1000);
  </script>
</body>
</html>
