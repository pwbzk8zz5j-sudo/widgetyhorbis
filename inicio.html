<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark" />
  <title>Saludo dinámico — Yhorbis</title>

  <style>
    :root{
      --text:#f7f2fb;
      --muted:#aaa0b4;
      --accent:#a855f7;
      --accent-2:#7c3aed;
      --accent-soft:#e0c4ff;
      --border:rgba(255,255,255,.09);
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      width:100%;
      min-height:100%;
      background:transparent!important;
      color:var(--text);
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }

    body{
      display:grid;
      place-items:center;
      padding:8px;
    }

    .hero{
      position:relative;
      isolation:isolate;
      overflow:hidden;
      width:min(100%,980px);
      min-height:190px;
      padding:25px 29px;
      border:1px solid var(--border);
      border-radius:25px;
      background:
        radial-gradient(circle at 86% 16%,rgba(168,85,247,.22),transparent 31%),
        radial-gradient(circle at 9% 100%,rgba(124,58,237,.13),transparent 30%),
        linear-gradient(145deg,rgba(20,16,27,.88),rgba(7,6,10,.92));
      box-shadow:
        0 18px 48px rgba(0,0,0,.34),
        inset 0 1px 0 rgba(255,255,255,.055);
      backdrop-filter:blur(22px) saturate(125%);
      -webkit-backdrop-filter:blur(22px) saturate(125%);
      transition:min-height .3s ease;
    }

    .hero::before{
      content:"";
      position:absolute;
      inset:0;
      z-index:-1;
      pointer-events:none;
      opacity:.32;
      background-image:
        linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),
        linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);
      background-size:32px 32px;
      mask-image:linear-gradient(90deg,black,transparent 80%);
      -webkit-mask-image:linear-gradient(90deg,black,transparent 80%);
    }

    .hero.sleep-mode{min-height:250px}

    .content{
      display:grid;
      grid-template-columns:minmax(0,1fr) auto;
      align-items:start;
      gap:28px;
    }

    .copy{min-width:0}

    h1{
      margin:0 0 10px;
      font-size:clamp(2.15rem,6.2vw,4.2rem);
      line-height:.98;
      letter-spacing:-.052em;
      text-wrap:balance;
    }

    .name{
      color:var(--accent-soft);
      text-shadow:0 0 22px rgba(168,85,247,.23);
    }

    .date{
      color:var(--muted);
      font-size:.9rem;
    }

    .clock{
      min-width:112px;
      color:#cbbad9;
      font-variant-numeric:tabular-nums;
      font-size:1.05rem;
      font-weight:720;
      text-align:right;
    }

    .sleep-note{
      display:none;
      max-width:680px;
      margin-top:21px;
      padding:13px 15px;
      border:1px solid rgba(224,196,255,.17);
      border-radius:15px;
      background:
        linear-gradient(145deg,rgba(168,85,247,.075),rgba(255,255,255,.023));
      box-shadow:inset 0 1px 0 rgba(255,255,255,.035);
      animation:appear .35s ease both;
    }

    .sleep-note.visible{display:block}

    .hero.sleep-mode .sleep-note{
      animation:appear .35s ease both,sleepPulse 3.4s ease-in-out infinite;
    }

    .sleep-label{
      margin-bottom:6px;
      color:var(--accent-soft);
      font-size:.68rem;
      font-weight:820;
      letter-spacing:.11em;
      text-transform:uppercase;
    }

    .sleep-text{
      color:#eee7f4;
      font-size:.9rem;
      line-height:1.5;
    }

    .moon{
      position:absolute;
      right:17%;
      bottom:-42px;
      z-index:-1;
      width:135px;
      height:135px;
      border:1px solid rgba(224,196,255,.09);
      border-radius:50%;
      opacity:.48;
      box-shadow:
        0 0 0 24px rgba(168,85,247,.025),
        0 0 0 48px rgba(168,85,247,.015);
      animation:float 5.4s ease-in-out infinite;
    }

    .star{
      position:absolute;
      width:4px;
      height:4px;
      border-radius:50%;
      background:var(--accent-soft);
      box-shadow:0 0 10px rgba(224,196,255,.7);
      animation:twinkle 2.8s ease-in-out infinite;
    }

    .s1{right:10%;top:25%;animation-delay:.2s}
    .s2{right:22%;top:18%;animation-delay:1.1s}
    .s3{right:6%;bottom:24%;animation-delay:1.8s}

    @keyframes sleepPulse{
      0%,100%{box-shadow:inset 0 1px 0 rgba(255,255,255,.035),0 0 0 rgba(168,85,247,0)}
      50%{box-shadow:inset 0 1px 0 rgba(255,255,255,.045),0 0 25px rgba(168,85,247,.10)}
    }

    @keyframes appear{
      from{opacity:0;transform:translateY(6px)}
      to{opacity:1;transform:translateY(0)}
    }

    @keyframes float{
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-8px)}
    }

    @keyframes twinkle{
      0%,100%{opacity:.2;transform:scale(.7)}
      50%{opacity:1;transform:scale(1.25)}
    }

    @media(max-width:640px){
      body{padding:6px}

      .hero{
        min-height:200px;
        padding:22px;
        border-radius:21px;
      }

      .hero.sleep-mode{min-height:275px}

      .content{
        grid-template-columns:1fr;
        gap:12px;
      }

      .clock{
        order:-1;
        min-width:0;
        text-align:left;
      }

      .moon{right:-18px}
    }

    @media(prefers-reduced-motion:reduce){
      .moon,.star,.sleep-note,.hero.sleep-mode .sleep-note{animation:none}
    }
  </style>
</head>

<body>
  <main class="hero" id="hero" aria-live="polite">
    <span class="moon" aria-hidden="true"></span>
    <span class="star s1" aria-hidden="true"></span>
    <span class="star s2" aria-hidden="true"></span>
    <span class="star s3" aria-hidden="true"></span>

    <div class="content">
      <div class="copy">
        <h1>
          <span id="greeting">Buenas noches</span>,<br>
          <span class="name">Yhorbis</span> <span id="emoji">🌙</span>
        </h1>

        <div class="date" id="date"></div>
      </div>

      <div class="clock" id="clock"></div>
    </div>

    <section class="sleep-note" id="sleepNote">
      <div class="sleep-label" id="sleepLabel">🌙 Yaiza dice: hora de mimir</div>
      <div class="sleep-text" id="sleepMessage"></div>
    </section>
  </main>

  <script>
    const TIME_ZONE = "America/Lima";

    const mensajesDormir = [
      "Amor... guarda el proyecto y ven a mimir. Mañana seguimos. 🤍",
      "Yhorbis, el video puede esperar. Tus ojitos no.",
      "¿Otra vez dijiste «cinco minutos más»? Ya te conozco. 😂",
      "Guarda antes de que Premiere decida cerrarse por ti. 😭",
      "Ya hiciste bastante por hoy. Ven a dormir conmigo.",
      "No quiero que mañana andes como zombie por toda la casa. 🥺",
      "Descansar también cuenta como parte del proyecto.",
      "Tu cama acaba de preguntar por ti.",
      "La idea no se va a escapar. Anótala y ven a mimir.",
      "Yo ya te mandé a dormir. Ahora hazme caso. 💜",
      "Mañana editas más rápido si hoy duermes, señor productor.",
      "No abras otro proyecto. Repito: no abras otro proyecto.",
      "Ese render puede quedarse pensando solito. Tú no tienes que acompañarlo.",
      "Yhorbis... cierra Premiere con cuidado y aléjate lentamente.",
      "Yaiza informa: oficialmente es hora de mimir.",
      "Te prometo que mañana se verá menos complicado después de dormir.",
      "No necesitas terminarlo esta madrugada. Solo déjalo listo para continuar.",
      "Último aviso cariñoso: guarda, apaga y ven a la cama. 🤍"
    ];

    const etiquetasMadrugada = [
      "🌙 Yaiza dice: hora de mimir",
      "😴 Control nocturno de Yhorbis",
      "💜 Mensajito obligatorio de madrugada",
      "🚨 Alerta: productor todavía despierto"
    ];

    function partesAhoraEnLima(){
      const ahora = new Date();

      const parts = new Intl.DateTimeFormat("en-CA",{
        timeZone:TIME_ZONE,
        year:"numeric",
        month:"2-digit",
        day:"2-digit",
        weekday:"short",
        hour:"2-digit",
        minute:"2-digit",
        second:"2-digit",
        hour12:false
      }).formatToParts(ahora);

      const values = Object.fromEntries(
        parts
          .filter(part => part.type !== "literal")
          .map(part => [part.type,part.value])
      );

      // Algunos navegadores representan medianoche como 24:xx.
      const hour = Number(values.hour) % 24;

      return {
        now:ahora,
        year:Number(values.year),
        month:Number(values.month),
        day:Number(values.day),
        weekday:values.weekday,
        hour,
        minute:Number(values.minute),
        second:Number(values.second)
      };
    }

    function esMadrugada(hour,minute){
      const totalMinutes = hour*60+minute;
      return totalMinutes >= 30 && totalMinutes < 6*60;
    }

    function saludoPorHora(hour,minute){
      if(esMadrugada(hour,minute)){
        if(hour >= 4){
          return ["Yhorbis... ¿sigues despierto?", "😴"];
        }

        return ["¿Todavía despierto?", "🌙"];
      }

      if(hour < 12) return ["Buenos días", "☀️"];
      if(hour < 19) return ["Buenas tardes", "🌤️"];
      return ["Buenas noches", "🌙"];
    }

    function claveFecha(parts){
      return `${parts.year}-${String(parts.month).padStart(2,"0")}-${String(parts.day).padStart(2,"0")}`;
    }

    function hashTexto(text){
      let hash = 0;

      for(const character of text){
        hash = (hash*31+character.charCodeAt(0)) >>> 0;
      }

      return hash;
    }

    function mensajeParaDormir(parts){
      const fecha = claveFecha(parts);
      const bloqueDeCincoMinutos = Math.floor((parts.hour*60+parts.minute)/5);
      const esDomingo = parts.weekday === "Sun";

      if(esDomingo && parts.hour >= 3 && parts.hour < 6){
        return "No sé qué haces despierto a esta hora... guarda el proyecto y ven a dormir conmigo. 🤍";
      }

      const index = (hashTexto(fecha)+bloqueDeCincoMinutos) % mensajesDormir.length;
      return mensajesDormir[index];
    }

    function etiquetaParaDormir(parts){
      const bloque = Math.floor((parts.hour*60+parts.minute)/10);
      return etiquetasMadrugada[bloque % etiquetasMadrugada.length];
    }

    function actualizar(){
      const parts = partesAhoraEnLima();
      const [saludo,emoji] = saludoPorHora(parts.hour,parts.minute);
      const mostrarMensajeDormir = esMadrugada(parts.hour,parts.minute);

      document.getElementById("greeting").textContent = saludo;
      document.getElementById("emoji").textContent = emoji;

      document.getElementById("date").textContent =
        new Intl.DateTimeFormat("es-PE",{
          timeZone:TIME_ZONE,
          weekday:"long",
          day:"numeric",
          month:"long",
          year:"numeric"
        }).format(parts.now).replace(/^./,character => character.toUpperCase());

      document.getElementById("clock").textContent =
        new Intl.DateTimeFormat("es-PE",{
          timeZone:TIME_ZONE,
          hour:"2-digit",
          minute:"2-digit",
          second:"2-digit",
          hour12:false
        }).format(parts.now);

      const sleepNote = document.getElementById("sleepNote");
      const sleepMessage = document.getElementById("sleepMessage");
      const sleepLabel = document.getElementById("sleepLabel");
      const hero = document.getElementById("hero");

      if(mostrarMensajeDormir){
        sleepMessage.textContent = mensajeParaDormir(parts);
        sleepLabel.textContent = etiquetaParaDormir(parts);
        sleepNote.classList.add("visible");
        hero.classList.add("sleep-mode");
      }else{
        sleepNote.classList.remove("visible");
        hero.classList.remove("sleep-mode");
      }
    }

    actualizar();
    setInterval(actualizar,1000);
  </script>
</body>
</html>
