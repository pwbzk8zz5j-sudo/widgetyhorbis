<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cajita de ideas — Fidget</title>
<style>
:root{
  --bg:#0b0a0f;
  --panel:#15131c;
  --panel-2:#100e16;
  --text:#f6f3fb;
  --muted:#91899d;
  --purple:#a855f7;
  --purple-2:#7c3aed;
  --soft:#d8b4fe;
  --border:rgba(255,255,255,.08);
}
*{box-sizing:border-box}
html,body{
  margin:0;
  min-height:100%;
  font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:transparent;
  color:var(--text);
}
body{
  padding:8px;
  display:grid;
  place-items:center;
}
.widget{
  width:min(100%,980px);
  padding:18px 22px;
  border:1px solid var(--border);
  border-radius:22px;
  background:
    radial-gradient(circle at 92% 8%,rgba(168,85,247,.18),transparent 26%),
    linear-gradient(145deg,var(--panel),var(--bg));
  box-shadow:0 16px 40px rgba(0,0,0,.28);
}
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:16px;
  margin-bottom:16px;
}
.header h1{
  margin:0;
  font-size:20px;
  font-weight:800;
  letter-spacing:-.03em;
}
.badge{
  padding:8px 12px;
  border:1px solid var(--border);
  border-radius:999px;
  background:rgba(255,255,255,.04);
  color:var(--soft);
  font-size:11px;
  font-weight:800;
}
.content{
  display:grid;
  grid-template-columns:150px 1fr;
  gap:24px;
  align-items:center;
}
.toy-box{
  position:relative;
  width:150px;
  height:104px;
  overflow:hidden;
  border:1px solid rgba(216,180,254,.16);
  border-radius:18px;
  background:
    radial-gradient(circle at 50% 45%,rgba(168,85,247,.12),transparent 44%),
    linear-gradient(145deg,rgba(255,255,255,.035),rgba(255,255,255,.015));
  box-shadow:inset 0 0 28px rgba(0,0,0,.18);
  user-select:none;
  touch-action:none;
}
.toy-box::after{
  content:"arrastra y suelta";
  position:absolute;
  left:50%;
  bottom:7px;
  transform:translateX(-50%);
  color:rgba(255,255,255,.26);
  font-size:9px;
  font-weight:700;
  letter-spacing:.08em;
  text-transform:uppercase;
  pointer-events:none;
  white-space:nowrap;
}
.bulb{
  position:absolute;
  left:43px;
  top:12px;
  width:64px;
  height:64px;
  cursor:grab;
  z-index:3;
  filter:drop-shadow(0 8px 12px rgba(0,0,0,.28));
  will-change:left,top,transform,filter;
}
.bulb:active{cursor:grabbing}
.bulb.glow{
  filter:
    drop-shadow(0 0 12px rgba(168,85,247,.95))
    drop-shadow(0 0 22px rgba(168,85,247,.55));
}
.copy{
  min-width:0;
}
.idea{
  font-size:17px;
  font-weight:700;
  line-height:1.5;
  letter-spacing:-.02em;
  transition:opacity .18s ease,transform .18s ease;
}
.idea strong{color:var(--soft)}
.idea.fade{
  opacity:.2;
  transform:translateY(3px);
}
.hint{
  margin-top:10px;
  color:var(--muted);
  font-size:11px;
}
.spark{
  position:absolute;
  width:6px;
  height:6px;
  border-radius:50%;
  background:var(--soft);
  box-shadow:0 0 10px rgba(216,180,254,.9);
  pointer-events:none;
  z-index:2;
  animation:spark .55s ease-out forwards;
}
@keyframes spark{
  from{opacity:1;transform:translate(0,0) scale(1)}
  to{opacity:0;transform:translate(var(--x),var(--y)) scale(.2)}
}
@media(max-width:620px){
  .content{
    grid-template-columns:1fr;
  }
  .toy-box{
    width:100%;
    height:112px;
  }
  .bulb{
    left:calc(50% - 32px);
  }
  .badge{display:none}
  .idea{font-size:15px}
}
@media(prefers-reduced-motion:reduce){
  *{scroll-behavior:auto!important}
}
</style>
</head>
<body>
<main class="widget">
  <div class="header">
    <h1>Cajita de ideas</h1>
    <div class="badge">💜 Fidget creativo</div>
  </div>

  <div class="content">
    <div class="toy-box" id="toyBox" aria-label="Zona interactiva para mover la bombilla">
      <svg id="bulb" class="bulb" viewBox="0 0 68 68" role="button" tabindex="0" aria-label="Bombilla interactiva">
        <defs>
          <radialGradient id="glassGlow" cx="38%" cy="28%">
            <stop offset="0%" stop-color="#fff8ff"/>
            <stop offset="46%" stop-color="#d8b4fe"/>
            <stop offset="100%" stop-color="#8b5cf6"/>
          </radialGradient>
        </defs>
        <path d="M34 7c-10 0-18 8-18 18 0 7 3 11 8 16 2 2 3 5 3 8h14c0-3 1-6 3-8 5-5 8-9 8-16 0-10-8-18-18-18z"
          fill="url(#glassGlow)" stroke="rgba(255,255,255,.65)" stroke-width="1.2"/>
        <path d="M29 35c1.5 2 3 4 3 8M39 35c-1.5 2-3 4-3 8"
          fill="none" stroke="#f7efff" stroke-width="1.7" stroke-linecap="round"/>
        <rect x="27" y="48" width="14" height="11" rx="2" fill="#56505e"/>
        <path d="M27 51h14M27 55h14" stroke="#2d2932" stroke-width="2"/>
        <rect x="30" y="59" width="8" height="3.5" rx="1.5" fill="#302b35"/>
      </svg>
    </div>

    <div class="copy">
      <div id="idea" class="idea">
        No hace falta que sea una <strong>buena idea</strong>. Solo no la olvides.
      </div>
      <div class="hint">
        Arrastra la bombilla, suéltala para lanzarla y haz clic para cambiar la frase.
      </div>
    </div>
  </div>
</main>

<script>
const phrases=[
  'No hace falta que sea una <strong>buena idea</strong>. Solo no la olvides.',
  'Escríbela ahora. <strong>Ya decidirás después</strong> qué hacer con ella.',
  'Una idea rara también merece una oportunidad.',
  'No la juzgues todavía. <strong>Solo guárdala.</strong>',
  'Quizá hoy sea solo una nota. <strong>Mañana puede ser un proyecto.</strong>',
  'Tu próxima buena idea puede empezar con una tontería.',
  'Anota eso que no quieres olvidar.',
  '¿Y si pruebas justo lo contrario?',
  'No necesitas la idea completa. Solo el primer pedacito.',
  'A veces la inspiración llega cuando dejas de perseguirla.'
];

const box=document.getElementById("toyBox");
const bulb=document.getElementById("bulb");
const idea=document.getElementById("idea");

let x=43, y=12;
let vx=0, vy=0;
let dragging=false;
let moved=false;
let pointerId=null;
let grabX=0, grabY=0;
let lastX=0, lastY=0, lastT=0;
let animationId=null;
let lastPhrase=0;

function clamp(v,min,max){
  return Math.min(Math.max(v,min),max);
}

function bounds(){
  return {
    maxX: box.clientWidth - bulb.offsetWidth,
    maxY: box.clientHeight - bulb.offsetHeight
  };
}

function render(){
  bulb.style.left=x+"px";
  bulb.style.top=y+"px";
}

function glow(){
  bulb.classList.add("glow");
  setTimeout(()=>bulb.classList.remove("glow"),220);
}

function sparks(){
  const count=6;
  for(let i=0;i<count;i++){
    const s=document.createElement("span");
    s.className="spark";
    s.style.left=(x+bulb.offsetWidth/2)+"px";
    s.style.top=(y+bulb.offsetHeight/2)+"px";
    const a=Math.random()*Math.PI*2;
    const d=18+Math.random()*20;
    s.style.setProperty("--x",Math.cos(a)*d+"px");
    s.style.setProperty("--y",Math.sin(a)*d+"px");
    box.appendChild(s);
    setTimeout(()=>s.remove(),600);
  }
}

function bounceLoop(){
  cancelAnimationFrame(animationId);
  const friction=.985;
  const bounce=.78;

  function step(){
    if(dragging) return;

    const b=bounds();
    x+=vx;
    y+=vy;

    let hit=false;

    if(x<=0){
      x=0;
      vx=Math.abs(vx)*bounce;
      hit=true;
    }else if(x>=b.maxX){
      x=b.maxX;
      vx=-Math.abs(vx)*bounce;
      hit=true;
    }

    if(y<=0){
      y=0;
      vy=Math.abs(vy)*bounce;
      hit=true;
    }else if(y>=b.maxY){
      y=b.maxY;
      vy=-Math.abs(vy)*bounce;
      hit=true;
    }

    vx*=friction;
    vy*=friction;

    if(hit){
      glow();
      if(Math.hypot(vx,vy)>3.2) sparks();
    }

    render();

    if(Math.hypot(vx,vy)>.08){
      animationId=requestAnimationFrame(step);
    }
  }

  animationId=requestAnimationFrame(step);
}

function changePhrase(){
  let i;
  do{
    i=Math.floor(Math.random()*phrases.length);
  }while(i===lastPhrase);

  lastPhrase=i;
  idea.classList.add("fade");
  setTimeout(()=>{
    idea.innerHTML=phrases[i];
    idea.classList.remove("fade");
  },120);
  glow();
  sparks();
}

bulb.addEventListener("pointerdown",e=>{
  dragging=true;
  moved=false;
  pointerId=e.pointerId;
  bulb.setPointerCapture(pointerId);
  cancelAnimationFrame(animationId);

  const r=bulb.getBoundingClientRect();
  grabX=e.clientX-r.left;
  grabY=e.clientY-r.top;

  lastX=e.clientX;
  lastY=e.clientY;
  lastT=performance.now();
  vx=0;
  vy=0;
});

bulb.addEventListener("pointermove",e=>{
  if(!dragging || e.pointerId!==pointerId) return;

  const r=box.getBoundingClientRect();
  const b=bounds();
  const now=performance.now();
  const dt=Math.max(8,now-lastT);

  const newX=clamp(e.clientX-r.left-grabX,0,b.maxX);
  const newY=clamp(e.clientY-r.top-grabY,0,b.maxY);

  vx=(e.clientX-lastX)/dt*16;
  vy=(e.clientY-lastY)/dt*16;

  if(Math.hypot(e.clientX-lastX,e.clientY-lastY)>1.5){
    moved=true;
  }

  x=newX;
  y=newY;
  render();

  lastX=e.clientX;
  lastY=e.clientY;
  lastT=now;
});

function release(e){
  if(!dragging || e.pointerId!==pointerId) return;

  dragging=false;
  try{ bulb.releasePointerCapture(pointerId); }catch(_){}
  pointerId=null;

  if(!moved){
    changePhrase();
  }else{
    vx=clamp(vx,-12,12);
    vy=clamp(vy,-12,12);
    bounceLoop();
  }
}

bulb.addEventListener("pointerup",release);
bulb.addEventListener("pointercancel",release);

bulb.addEventListener("keydown",e=>{
  if(e.key==="Enter" || e.key===" "){
    e.preventDefault();
    changePhrase();
  }
});

window.addEventListener("resize",()=>{
  const b=bounds();
  x=clamp(x,0,b.maxX);
  y=clamp(y,0,b.maxY);
  render();
});

render();
</script>
</body>
</html>
