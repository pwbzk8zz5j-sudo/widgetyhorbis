<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cajita de ideas — Lámpara de lava dinámica</title>
<style>
:root{
  --bg:#0b0a0f;
  --panel:#15131c;
  --text:#f6f3fb;
  --muted:#91899d;
  --purple:#a855f7;
  --purple2:#7c3aed;
  --soft:#d8b4fe;
  --border:rgba(255,255,255,.08);
}
*{box-sizing:border-box}
html,body{
  margin:0;
  min-height:100%;
  font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:transparent;
  color:var(--text);
}
body{
  padding:8px;
  display:grid;
  place-items:center;
}
.widget{
  width:min(100%,980px);
  padding:18px 22px;
  border:1px solid var(--border);
  border-radius:22px;
  background:
    radial-gradient(circle at 92% 8%,rgba(168,85,247,.18),transparent 26%),
    linear-gradient(145deg,var(--panel),var(--bg));
  box-shadow:0 16px 40px rgba(0,0,0,.28);
  overflow:hidden;
}
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:16px;
  margin-bottom:16px;
}
.header h1{
  margin:0;
  font-size:20px;
  font-weight:800;
  letter-spacing:-.03em;
}
.badge{
  padding:8px 12px;
  border:1px solid var(--border);
  border-radius:999px;
  background:rgba(255,255,255,.04);
  color:var(--soft);
  font-size:11px;
  font-weight:800;
}
.content{
  display:grid;
  grid-template-columns:260px 1fr;
  gap:26px;
  align-items:center;
}
.lamp{
  position:relative;
  width:260px;
  height:146px;
  overflow:hidden;
  border:1px solid rgba(216,180,254,.14);
  border-radius:20px;
  background:
    radial-gradient(circle at 50% 55%,rgba(168,85,247,.10),transparent 60%),
    linear-gradient(180deg,rgba(255,255,255,.035),rgba(255,255,255,.012));
  box-shadow:
    inset 0 0 36px rgba(0,0,0,.24),
    0 0 28px rgba(168,85,247,.08);
  cursor:pointer;
  isolation:isolate;
}
.lamp::before,
.lamp::after{
  content:"";
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  width:78%;
  height:9px;
  border-radius:999px;
  background:linear-gradient(90deg,rgba(255,255,255,.04),rgba(216,180,254,.18),rgba(255,255,255,.04));
  z-index:5;
  pointer-events:none;
}
.lamp::before{top:8px}
.lamp::after{bottom:8px}

#lava{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  display:block;
}

.glass{
  position:absolute;
  inset:0;
  z-index:4;
  pointer-events:none;
  background:
    linear-gradient(90deg,rgba(255,255,255,.05),transparent 13%,transparent 87%,rgba(255,255,255,.03)),
    radial-gradient(circle at 30% 20%,rgba(255,255,255,.05),transparent 24%);
  mix-blend-mode:screen;
}

.ripple{
  position:absolute;
  width:18px;
  height:18px;
  border:1px solid rgba(216,180,254,.7);
  border-radius:50%;
  transform:translate(-50%,-50%) scale(.4);
  pointer-events:none;
  animation:ripple .8s ease-out forwards;
  z-index:6;
}

.copy{min-width:0}
.idea{
  font-size:18px;
  font-weight:750;
  line-height:1.5;
  letter-spacing:-.025em;
  transition:opacity .2s ease,transform .2s ease;
}
.idea strong{color:var(--soft)}
.idea.fade{opacity:.15;transform:translateY(4px)}
.hint{
  margin-top:10px;
  color:var(--muted);
  font-size:11px;
}

@keyframes ripple{
  0%{opacity:.95;transform:translate(-50%,-50%) scale(.4)}
  100%{opacity:0;transform:translate(-50%,-50%) scale(7)}
}

@media(max-width:650px){
  .content{grid-template-columns:1fr}
  .lamp{width:100%}
  .badge{display:none}
  .idea{font-size:16px}
}
</style>
</head>
<body>
<main class="widget">
  <div class="header">
    <h1>Cajita de ideas</h1>
    <div class="badge">Inspiración en movimiento</div>
  </div>

  <div class="content">
    <div class="lamp" id="lamp" role="button" tabindex="0" aria-label="Lámpara de lava interactiva">
      <canvas id="lava"></canvas>
      <div class="glass"></div>
    </div>

    <div class="copy">
      <div class="idea" id="idea">
        Las ideas flotan. <strong>No las persigas.</strong> Déjalas aparecer.
      </div>
      <div class="hint">
        Se mueve sola. Haz clic para agitar la lava y cambiar la inspiración.
      </div>
    </div>
  </div>
</main>

<script>
const phrases=[
  'Las ideas flotan. <strong>No las persigas.</strong> Déjalas aparecer.',
  'A veces la mejor idea llega cuando dejas de buscarla.',
  'Una idea rara también merece una oportunidad.',
  'No necesitas la idea completa. Solo el primer pedacito.',
  'Quizá hoy sea una nota. <strong>Mañana puede ser un proyecto.</strong>',
  'Escríbela antes de que vuelva a esconderse.',
  '¿Y si pruebas justo lo contrario?',
  'Tu próxima buena idea puede empezar con una tontería.',
  'Lo incompleto también puede tener dirección.',
  'Dale cinco minutos antes de descartarla.'
];

const lamp=document.getElementById("lamp");
const canvas=document.getElementById("lava");
const ctx=canvas.getContext("2d");
const idea=document.getElementById("idea");

let dpr=Math.min(window.devicePixelRatio||1,2);
let width=0;
let height=0;
let phraseIndex=0;
let mouse={x:0,y:0,active:false};
let lastTime=performance.now();

const blobCount=14;
const blobs=[];

function resize(){
  const rect=lamp.getBoundingClientRect();
  width=rect.width;
  height=rect.height;
  canvas.width=Math.round(width*dpr);
  canvas.height=Math.round(height*dpr);
  canvas.style.width=width+"px";
  canvas.style.height=height+"px";
  ctx.setTransform(dpr,0,0,dpr,0,0);
}

function random(min,max){
  return Math.random()*(max-min)+min;
}

function makeBlob(i){
  const radius=random(12,28);
  return {
    x:random(radius,width-radius),
    y:random(radius,height-radius),
    vx:random(-0.32,0.32),
    vy:random(-0.28,0.28),
    radius,
    baseRadius:radius,
    phase:random(0,Math.PI*2),
    breathSpeed:random(.0012,.0024),
    hueShift:random(-10,10),
    seed:i*13.37
  };
}

function initBlobs(){
  blobs.length=0;
  for(let i=0;i<blobCount;i++) blobs.push(makeBlob(i));
}

function softBounds(b){
  const pad=b.radius+8;
  const force=.0018;

  if(b.x<pad) b.vx+=(pad-b.x)*force;
  if(b.x>width-pad) b.vx-=(b.x-(width-pad))*force;
  if(b.y<pad) b.vy+=(pad-b.y)*force;
  if(b.y>height-pad) b.vy-=(b.y-(height-pad))*force;
}

function interactBlobs(){
  for(let i=0;i<blobs.length;i++){
    for(let j=i+1;j<blobs.length;j++){
      const a=blobs[i];
      const b=blobs[j];
      const dx=b.x-a.x;
      const dy=b.y-a.y;
      const dist=Math.hypot(dx,dy)||1;
      const minDist=(a.radius+b.radius)*.72;

      if(dist<minDist){
        const push=(minDist-dist)*.00075;
        const nx=dx/dist;
        const ny=dy/dist;
        a.vx-=nx*push;
        a.vy-=ny*push;
        b.vx+=nx*push;
        b.vy+=ny*push;
      }else if(dist<110){
        const pull=(110-dist)*.0000024;
        const nx=dx/dist;
        const ny=dy/dist;
        a.vx+=nx*pull;
        a.vy+=ny*pull;
        b.vx-=nx*pull;
        b.vy-=ny*pull;
      }
    }
  }
}

function update(dt,time){
  interactBlobs();

  for(const b of blobs){
    const flowX=Math.sin(time*.00035+b.seed)*.00055;
    const flowY=Math.cos(time*.00028+b.seed*1.7)*.00045;

    b.vx+=flowX*dt;
    b.vy+=flowY*dt;

    if(mouse.active){
      const dx=b.x-mouse.x;
      const dy=b.y-mouse.y;
      const dist=Math.hypot(dx,dy)||1;
      if(dist<90){
        const strength=(90-dist)/90;
        b.vx+=(dx/dist)*strength*.012*dt;
        b.vy+=(dy/dist)*strength*.012*dt;
      }
    }

    softBounds(b);

    const speed=Math.hypot(b.vx,b.vy);
    const maxSpeed=.58;
    if(speed>maxSpeed){
      b.vx=(b.vx/speed)*maxSpeed;
      b.vy=(b.vy/speed)*maxSpeed;
    }

    b.vx*=Math.pow(.995,dt);
    b.vy*=Math.pow(.995,dt);

    b.x+=b.vx*dt;
    b.y+=b.vy*dt;

    const breathe=Math.sin(time*b.breathSpeed+b.phase);
    b.radius=b.baseRadius*(1+breathe*.12);
  }
}

function drawBlob(b){
  const stretchX=1+Math.min(Math.abs(b.vx)*.55,.22);
  const stretchY=1+Math.min(Math.abs(b.vy)*.55,.22);

  ctx.save();
  ctx.translate(b.x,b.y);
  ctx.rotate(Math.atan2(b.vy,b.vx)*.12);
  ctx.scale(stretchX,stretchY);

  const grad=ctx.createRadialGradient(
    -b.radius*.28,-b.radius*.32,b.radius*.1,
    0,0,b.radius*1.12
  );
  grad.addColorStop(0,"rgba(255,255,255,.92)");
  grad.addColorStop(.18,"rgba(221,185,255,.98)");
  grad.addColorStop(.52,"rgba(168,85,247,.96)");
  grad.addColorStop(1,"rgba(108,43,205,.96)");

  ctx.fillStyle=grad;
  ctx.shadowColor="rgba(168,85,247,.48)";
  ctx.shadowBlur=18;
  ctx.beginPath();
  ctx.arc(0,0,b.radius,0,Math.PI*2);
  ctx.fill();

  ctx.restore();
}

function draw(){
  ctx.clearRect(0,0,width,height);

  ctx.save();
  ctx.globalCompositeOperation="screen";
  for(const b of blobs) drawBlob(b);
  ctx.restore();

  ctx.save();
  ctx.globalCompositeOperation="source-over";
  ctx.filter="blur(7px)";
  ctx.globalAlpha=.78;
  for(const b of blobs) drawBlob(b);
  ctx.restore();

  ctx.save();
  ctx.globalCompositeOperation="screen";
  ctx.globalAlpha=.55;
  for(const b of blobs) drawBlob(b);
  ctx.restore();
}

function loop(time){
  const dt=Math.min((time-lastTime)/16.6667,2.2);
  lastTime=time;
  update(dt,time);
  draw();
  requestAnimationFrame(loop);
}

function nextPhrase(){
  phraseIndex=(phraseIndex+1)%phrases.length;
  idea.classList.add("fade");
  setTimeout(()=>{
    idea.innerHTML=phrases[phraseIndex];
    idea.classList.remove("fade");
  },150);
}

function rippleAt(x,y){
  const r=document.createElement("span");
  r.className="ripple";
  r.style.left=x+"px";
  r.style.top=y+"px";
  lamp.appendChild(r);
  setTimeout(()=>r.remove(),820);
}

function pulseAt(x,y){
  for(const b of blobs){
    const dx=b.x-x;
    const dy=b.y-y;
    const dist=Math.hypot(dx,dy)||1;
    const force=Math.max(0,1-dist/180);
    b.vx+=(dx/dist)*force*1.15;
    b.vy+=(dy/dist)*force*1.15;
  }
}

function activate(clientX=null,clientY=null){
  const rect=lamp.getBoundingClientRect();
  const x=clientX===null ? rect.width/2 : clientX-rect.left;
  const y=clientY===null ? rect.height/2 : clientY-rect.top;
  rippleAt(x,y);
  pulseAt(x,y);
  nextPhrase();
}

lamp.addEventListener("mousemove",e=>{
  const rect=lamp.getBoundingClientRect();
  mouse.x=e.clientX-rect.left;
  mouse.y=e.clientY-rect.top;
  mouse.active=true;
});
lamp.addEventListener("mouseleave",()=>mouse.active=false);
lamp.addEventListener("click",e=>activate(e.clientX,e.clientY));
lamp.addEventListener("keydown",e=>{
  if(e.key==="Enter"||e.key===" "){
    e.preventDefault();
    activate();
  }
});

window.addEventListener("resize",()=>{
  resize();
  for(const b of blobs){
    b.x=Math.min(Math.max(b.radius,b.x),width-b.radius);
    b.y=Math.min(Math.max(b.radius,b.y),height-b.radius);
  }
});

resize();
initBlobs();
requestAnimationFrame(loop);
</script>
</body>
</html>
