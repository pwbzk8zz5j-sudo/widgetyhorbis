<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kanelista — Widget de inicio</title>

  <style>
    :root {
      --bg-1: #05070a;
      --bg-2: #0b1118;
      --bg-3: #101a24;
      --text: #f6f8fb;
      --muted: #94a3b8;
      --cyan: #49cfff;
      --cyan-soft: #b6edff;
      --line: rgba(125, 211, 252, 0.18);
      --glow: rgba(73, 207, 255, 0.20);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: transparent;
      font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
    }

    body {
      display: grid;
      place-items: center;
      padding: 10px;
    }

    .widget {
      position: relative;
      width: min(100%, 1180px);
      min-height: 260px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 28px;
      background:
        radial-gradient(circle at 78% 24%, rgba(73, 207, 255, 0.14), transparent 26%),
        linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 50%, var(--bg-3) 100%);
      box-shadow:
        0 22px 65px rgba(0, 0, 0, 0.48),
        0 0 34px var(--glow);
      padding: clamp(26px, 4vw, 44px);
      isolation: isolate;
    }

    .glow {
      position: absolute;
      border-radius: 50%;
      filter: blur(34px);
      background: rgba(73, 207, 255, 0.14);
      pointer-events: none;
      z-index: 0;
    }

    .glow.one {
      width: 260px;
      height: 260px;
      right: -50px;
      top: -90px;
    }

    .glow.two {
      width: 170px;
      height: 170px;
      left: -60px;
      bottom: -85px;
      opacity: .7;
    }

    .spark {
      position: absolute;
      width: 6px;
      height: 6px;
      background: var(--cyan);
      transform: rotate(45deg);
      box-shadow:
        0 0 8px var(--cyan),
        0 0 18px rgba(73, 207, 255, 0.65);
      animation: twinkle 3.2s infinite ease-in-out;
      z-index: 1;
    }

    .spark.small {
      width: 4px;
      height: 4px;
      opacity: .8;
    }

    .s1 { top: 18%; left: 7%; animation-delay: 0s; }
    .s2 { top: 17%; right: 24%; animation-delay: .7s; }
    .s3 { bottom: 20%; right: 8%; animation-delay: 1.3s; }
    .s4 { bottom: 14%; left: 38%; animation-delay: 1.9s; }
    .s5 { top: 34%; right: 5%; animation-delay: 2.4s; }
    .s6 { bottom: 30%; left: 4%; animation-delay: 2.8s; }

    @keyframes twinkle {
      0%, 100% {
        opacity: .18;
        transform: rotate(45deg) scale(.72);
      }
      50% {
        opacity: 1;
        transform: rotate(45deg) scale(1.28);
      }
    }

    .content {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: 1.25fr .8fr;
      gap: clamp(30px, 5vw, 76px);
      align-items: center;
      min-height: 190px;
    }

    .greeting {
      margin: 0;
      font-size: clamp(2.2rem, 5vw, 4.9rem);
      line-height: .98;
      letter-spacing: -0.05em;
      font-weight: 850;
    }

    .name {
      color: var(--cyan);
      text-shadow: 0 0 20px rgba(73, 207, 255, 0.18);
    }

    .time-row {
      display: flex;
      align-items: flex-end;
      gap: 24px;
      margin-top: 28px;
      padding-top: 22px;
      border-top: 1px solid rgba(148, 163, 184, 0.18);
    }

    .clock {
      font-size: clamp(3.6rem, 8vw, 6.9rem);
      line-height: .82;
      font-weight: 860;
      letter-spacing: -0.07em;
      font-variant-numeric: tabular-nums;
      text-shadow:
        0 0 12px rgba(73, 207, 255, 0.14),
        0 0 26px rgba(73, 207, 255, 0.12);
    }

    .date {
      padding-bottom: 3px;
      color: var(--muted);
      font-size: clamp(.96rem, 1.7vw, 1.15rem);
      line-height: 1.5;
    }

    .message-wrap {
      position: relative;
      padding-left: 22px;
    }

    .message-wrap::before {
      content: "";
      position: absolute;
      left: 0;
      top: 2px;
      bottom: 2px;
      width: 3px;
      border-radius: 99px;
      background: var(--cyan);
      box-shadow: 0 0 14px rgba(73, 207, 255, 0.55);
    }

    .message {
      margin: 0;
      color: var(--cyan-soft);
      font-size: clamp(1.08rem, 2vw, 1.34rem);
      line-height: 1.6;
    }

    @media (max-width: 760px) {
      .widget {
        min-height: 380px;
      }

      .content {
        grid-template-columns: 1fr;
      }

      .time-row {
        align-items: flex-start;
        flex-direction: column;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .spark {
        animation: none;
      }
    }
  </style>
</head>

<body>
  <main class="widget" aria-live="polite">
    <span class="glow one"></span>
    <span class="glow two"></span>

    <span class="spark s1"></span>
    <span class="spark small s2"></span>
    <span class="spark s3"></span>
    <span class="spark small s4"></span>
    <span class="spark small s5"></span>
    <span class="spark s6"></span>

    <div class="content">
      <section>
        <h1 class="greeting">
          <span id="greeting">Buenas tardes</span>,
          <span class="name">Kanelista.</span>
        </h1>

        <div class="time-row">
          <div id="clock" class="clock">08:46</div>
          <div id="date" class="date">
            Viernes<br />
            17 de julio de 2026
          </div>
        </div>
      </section>

      <section class="message-wrap">
        <p id="message" class="message">
          No necesitas hacerlo perfecto. Solo seguir construyendo.
        </p>
      </section>
    </div>
  </main>

  <script>
    const timeZone = "America/Lima";

    const messages = [
      "No necesitas hacerlo perfecto. Solo seguir construyendo.",
      "Haz primero eso que llevas rato evitando. Sí, eso mismo.",
      "Una tarea terminada se siente mejor que cinco empezadas por emoción.",
      "Tu cerebro no es una máquina. Descansar también cuenta.",
      "Menos perfección, más avance real.",
      "Captura primero. Organiza después.",
      "El caos también puede convertirse en sistema.",
      "Tu yo del futuro va a agradecer esta decisión pequeña.",
      "Haz una sola cosa bien. Luego decides qué sigue.",
      "No abras siete proyectos nuevos por emoción. Te conozco.",
      "Hoy también cuenta, aunque avances poquito.",
      "Lo urgente hace ruido. Lo importante construye.",
      "Una idea guardada deja de perseguirte.",
      "Construye antes de consumir.",
      "No todo tiene que resolverse hoy.",
      "Baja un cambio. Sigues avanzando igual.",
      "Las ganas suelen llegar después de empezar.",
      "Tu vida no necesita verse perfecta para estar tomando forma.",
      "Cierra ciclos pequeños. Se siente mejor de lo que parece.",
      "Haz que cuente, pero no te revientes."
    ];

    function getCurrentParts() {
      const now = new Date();

      const hour = Number(
        new Intl.DateTimeFormat("es-PE", {
          timeZone,
          hour: "2-digit",
          hour12: false
        }).format(now)
      );

      const minute = new Intl.DateTimeFormat("es-PE", {
        timeZone,
        minute: "2-digit"
      }).format(now);

      const weekday = new Intl.DateTimeFormat("es-PE", {
        timeZone,
        weekday: "long"
      }).format(now);

      const longDate = new Intl.DateTimeFormat("es-PE", {
        timeZone,
        day: "numeric",
        month: "long",
        year: "numeric"
      }).format(now);

      return { hour, minute, weekday, longDate };
    }

    function greetingFor(hour) {
      if (hour >= 5 && hour < 12) return "Buenos días";
      if (hour >= 12 && hour < 19) return "Buenas tardes";
      return "Buenas noches";
    }

    function capitalize(text) {
      return text.charAt(0).toUpperCase() + text.slice(1);
    }

    function messageIndexForToday() {
      const now = new Date();
      const dateKey = new Intl.DateTimeFormat("en-CA", {
        timeZone,
        year: "numeric",
        month: "2-digit",
        day: "2-digit"
      }).format(now);

      let hash = 0;
      for (const character of dateKey) {
        hash = (hash * 31 + character.charCodeAt(0)) >>> 0;
      }

      return hash % messages.length;
    }

    function updateWidget() {
      const { hour, minute, weekday, longDate } = getCurrentParts();
      const paddedHour = String(hour).padStart(2, "0");

      document.getElementById("greeting").textContent = greetingFor(hour);
      document.getElementById("clock").textContent =
        paddedHour + ":" + minute;
      document.getElementById("date").innerHTML =
        capitalize(weekday) + "<br>" + longDate;
      document.getElementById("message").textContent =
        messages[messageIndexForToday()];
    }

    updateWidget();
    setInterval(updateWidget, 1000);
  </script>
</body>
</html>
