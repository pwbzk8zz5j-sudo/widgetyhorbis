<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>Foquito interactivo — Yhorbis</title>

  <style>
    :root{
      --text:#f8f4fc;
      --muted:#a49aad;
      --purple:#a855f7;
      --purple-2:#7c3aed;
      --soft:#e2c9ff;
      --yellow:#fff2a8;
      --line:rgba(255,255,255,.085);
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      width:100%;
      min-height:100%;
      background:transparent!important;
      color:var(--text);
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }

    body{
      display:grid;
      place-items:center;
      padding:8px;
    }

    .widget{
      position:relative;
      isolation:isolate;
      overflow:hidden;
      width:min(100%,980px);
      padding:18px 21px;
      border:1px solid var(--line);
      border-radius:23px;
      background:
        radial-gradient(circle at 92% 10%,rgba(168,85,247,.18),transparent 28%),
        linear-gradient(145deg,rgba(20,16,27,.88),rgba(7,6,10,.92));
      box-shadow:
        0 17px 43px rgba(0,0,0,.31),
        inset 0 1px 0 rgba(255,255,255,.05);
      backdrop-filter:blur(22px) saturate(125%);
      -webkit-backdrop-filter:blur(22px) saturate(125%);
    }

    .header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      margin-bottom:14px;
    }

    .header h1{
      margin:0;
      font-size:1.12rem;
      font-weight:820;
      letter-spacing:-.03em;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:7px;
      padding:7px 10px;
      border:1px solid var(--line);
      border-radius:999px;
      color:var(--soft);
      background:rgba(168,85,247,.06);
      font-size:.52rem;
      font-weight:820;
      letter-spacing:.08em;
      text-transform:uppercase;
    }

    .badge-dot{
      width:6px;
      height:6px;
      border-radius:50%;
      background:var(--purple);
      box-shadow:0 0 9px rgba(168,85,247,.55);
    }

    .content{
      display:grid;
      grid-template-columns:minmax(300px,.95fr) minmax(0,1.05fr);
      gap:27px;
      align-items:center;
    }

    .toy-box{
      position:relative;
      width:100%;
      height:158px;
      overflow:hidden;
      border:1px solid rgba(226,201,255,.14);
      border-radius:22px;
      background:
        radial-gradient(circle at 50% 115%,rgba(168,85,247,.08),transparent 47%),
        linear-gradient(180deg,rgba(255,255,255,.025),rgba(255,255,255,.012));
      box-shadow:
        inset 0 0 42px rgba(0,0,0,.27),
        0 0 26px rgba(168,85,247,.065);
      touch-action:none;
      user-select:none;
    }

    .toy-box::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background-image:
        linear-gradient(rgba(255,255,255,.016) 1px,transparent 1px),
        linear-gradient(90deg,rgba(255,255,255,.016) 1px,transparent 1px);
      background-size:24px 24px;
      mask-image:linear-gradient(to bottom,black,transparent 92%);
      -webkit-mask-image:linear-gradient(to bottom,black,transparent 92%);
    }

    .bulb{
      position:absolute;
      left:42px;
      top:26px;
      width:68px;
      height:94px;
      padding:0;
      border:0;
      outline:none;
      cursor:grab;
      background:transparent;
      touch-action:none;
      filter:drop-shadow(0 12px 16px rgba(0,0,0,.28));
      transform:translate3d(0,0,0) rotate(var(--rotation,0deg));
      will-change:left,top,transform,filter;
    }

    .bulb:active{cursor:grabbing}

    .glass{
      position:absolute;
      left:10px;
      top:2px;
      width:48px;
      height:53px;
      border:1px solid rgba(226,201,255,.22);
      border-radius:52% 52% 44% 44% / 58% 58% 40% 40%;
      background:
        radial-gradient(circle at 35% 28%,rgba(255,255,255,.21),transparent 20%),
        linear-gradient(145deg,rgba(224,196,255,.12),rgba(168,85,247,.05));
      box-shadow:
        inset 0 -8px 14px rgba(44,18,67,.22),
        0 0 0 rgba(255,242,168,0);
      transition:
        background .16s ease,
        box-shadow .16s ease,
        border-color .16s ease;
    }

    .filament{
      position:absolute;
      left:26px;
      top:29px;
      width:16px;
      height:12px;
      border:2px solid rgba(224,196,255,.4);
      border-top:0;
      border-radius:0 0 10px 10px;
      opacity:.55;
      transition:border-color .16s ease,opacity .16s ease;
    }

    .filament::before,
    .filament::after{
      content:"";
      position:absolute;
      bottom:-15px;
      width:2px;
      height:17px;
      border-radius:999px;
      background:rgba(224,196,255,.4);
    }

    .filament::before{left:2px;transform:rotate(-10deg)}
    .filament::after{right:2px;transform:rotate(10deg)}

    .neck{
      position:absolute;
      left:21px;
      top:51px;
      width:26px;
      height:9px;
      border-radius:5px 5px 2px 2px;
      background:linear-gradient(180deg,#6e5b7d,#3b3143);
    }

    .base{
      position:absolute;
      left:18px;
      top:58px;
      width:32px;
      height:26px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.08);
      border-radius:4px 4px 9px 9px;
      background:
        repeating-linear-gradient(
          to bottom,
          #5f526b 0 3px,
          #342c3c 3px 6px
        );
      box-shadow:inset 0 1px 0 rgba(255,255,255,.08);
    }

    .base::after{
      content:"";
      position:absolute;
      left:9px;
      bottom:-7px;
      width:12px;
      height:12px;
      border-radius:50%;
      background:#2a2330;
    }

    .bulb.on .glass{
      border-color:rgba(255,247,196,.68);
      background:
        radial-gradient(circle at 36% 28%,rgba(255,255,255,.85),transparent 20%),
        radial-gradient(circle at 50% 50%,rgba(255,244,175,.95),rgba(255,214,105,.72) 53%,rgba(168,85,247,.16) 76%);
      box-shadow:
        inset 0 -4px 13px rgba(255,213,105,.24),
        0 0 17px rgba(255,240,160,.75),
        0 0 42px rgba(255,215,105,.44),
        0 0 70px rgba(168,85,247,.24);
    }

    .bulb.on .filament{
      border-color:#fff7bd;
      opacity:1;
      filter:drop-shadow(0 0 5px #fff0a0);
    }

    .bulb.on .filament::before,
    .bulb.on .filament::after{
      background:#fff3aa;
      box-shadow:0 0 5px rgba(255,240,160,.75);
    }

    .halo{
      position:absolute;
      left:50%;
      top:47%;
      width:80px;
      height:80px;
      border-radius:50%;
      pointer-events:none;
      opacity:0;
      background:radial-gradient(circle,rgba(255,235,145,.34),rgba(168,85,247,.12) 43%,transparent 70%);
      filter:blur(7px);
      transform:translate(-50%,-50%) scale(.68);
      transition:opacity .16s ease,transform .16s ease;
    }

    .bulb.on .halo{
      opacity:1;
      transform:translate(-50%,-50%) scale(1.12);
    }

    .spark{
      position:absolute;
      z-index:8;
      width:5px;
      height:5px;
      border-radius:50%;
      pointer-events:none;
      background:var(--yellow);
      box-shadow:0 0 9px rgba(255,239,159,.9);
      animation:spark .62s ease-out forwards;
    }

    .copy{min-width:0}

    .message{
      margin:0;
      color:#f5eff9;
      font-size:.92rem;
      font-weight:710;
      line-height:1.5;
      letter-spacing:-.02em;
      transition:opacity .18s ease,transform .18s ease;
    }

    .message strong{color:var(--soft)}

    .hint{
      margin-top:10px;
      color:var(--muted);
      font-size:.55rem;
      line-height:1.5;
    }

    .status{
      display:flex;
      align-items:center;
      gap:7px;
      margin-top:12px;
      color:#7f7387;
      font-size:.53rem;
      font-weight:760;
      letter-spacing:.07em;
      text-transform:uppercase;
    }

    .status-light{
      width:7px;
      height:7px;
      border-radius:50%;
      background:#403747;
      transition:background .16s ease,box-shadow .16s ease;
    }

    .status.active .status-light{
      background:var(--yellow);
      box-shadow:0 0 9px rgba(255,239,159,.7);
    }

    @keyframes spark{
      from{
        opacity:1;
        transform:translate(0,0) scale(1);
      }
      to{
        opacity:0;
        transform:translate(var(--x),var(--y)) scale(.2);
      }
    }

    @media(max-width:680px){
      .content{grid-template-columns:1fr;gap:15px}
      .toy-box{height:145px}
      .badge{display:none}
      .message{font-size:.84rem}
    }

    @media(prefers-reduced-motion:reduce){
      .spark{animation:none}
      .glass,.halo,.status-light{transition:none}
    }
  </style>
</head>

<body>
  <main class="widget">
    <div class="header">
      <h1>Foquito interactivo</h1>
      <div class="badge">
        <span class="badge-dot"></span>
        Tócalo y muévelo
      </div>
    </div>

    <section class="content">
      <div class="toy-box" id="toyBox">
        <button class="bulb" id="bulb" type="button" aria-label="Foquito interactivo">
          <span class="halo"></span>
          <span class="glass"></span>
          <span class="filament"></span>
          <span class="neck"></span>
          <span class="base"></span>
        </button>
      </div>

      <div class="copy">
        <p class="message">
          Tócalo para <strong>prenderlo</strong>, arrástralo y suéltalo para verlo rebotar.
        </p>

        <p class="hint">
          Mientras lo estés tocando o moviendo, el foquito permanece encendido.
          Después se apaga solito.
        </p>

        <div class="status" id="status">
          <span class="status-light"></span>
          <span id="statusText">Foquito apagado</span>
        </div>
      </div>
    </section>
  </main>

  <script>
    (() => {
      "use strict";

      const box = document.getElementById("toyBox");
      const bulb = document.getElementById("bulb");
      const status = document.getElementById("status");
      const statusText = document.getElementById("statusText");

      let x = 42;
      let y = 26;
      let vx = 0;
      let vy = 0;
      let rotation = 0;
      let angularVelocity = 0;

      let dragging = false;
      let pointerId = null;
      let grabX = 0;
      let grabY = 0;
      let lastX = 0;
      let lastY = 0;
      let lastT = 0;
      let animationId = null;
      let offTimer = null;
      let visible = !document.hidden;

      function clamp(value,min,max){
        return Math.min(Math.max(value,min),max);
      }

      function bounds(){
        return {
          maxX:Math.max(0,box.clientWidth-bulb.offsetWidth),
          maxY:Math.max(0,box.clientHeight-bulb.offsetHeight)
        };
      }

      function render(){
        bulb.style.left = `${x}px`;
        bulb.style.top = `${y}px`;
        bulb.style.setProperty("--rotation",`${rotation}deg`);
      }

      function lightOn(){
        clearTimeout(offTimer);
        bulb.classList.add("on");
        status.classList.add("active");
        statusText.textContent = "Foquito encendido";
      }

      function scheduleLightOff(delay=850){
        clearTimeout(offTimer);
        offTimer = setTimeout(() => {
          if(!dragging){
            bulb.classList.remove("on");
            status.classList.remove("active");
            statusText.textContent = "Foquito apagado";
          }
        },delay);
      }

      function sparks(count=7){
        const centerX = x + bulb.offsetWidth/2;
        const centerY = y + bulb.offsetHeight*.34;

        for(let i=0;i<count;i++){
          const spark = document.createElement("span");
          const angle = Math.random()*Math.PI*2;
          const distance = 16 + Math.random()*25;

          spark.className = "spark";
          spark.style.left = `${centerX}px`;
          spark.style.top = `${centerY}px`;
          spark.style.setProperty("--x",`${Math.cos(angle)*distance}px`);
          spark.style.setProperty("--y",`${Math.sin(angle)*distance}px`);

          box.appendChild(spark);
          setTimeout(() => spark.remove(),650);
        }
      }

      function startInertia(){
        cancelAnimationFrame(animationId);

        const friction = .987;
        const angularFriction = .972;
        const bounce = .78;

        function step(){
          if(!visible || dragging) return;

          const b = bounds();

          x += vx;
          y += vy;
          rotation += angularVelocity;

          let hit = false;
          let impact = 0;

          if(x <= 0){
            impact = Math.max(impact,Math.abs(vx));
            x = 0;
            vx = Math.abs(vx)*bounce;
            angularVelocity += .7;
            hit = true;
          }else if(x >= b.maxX){
            impact = Math.max(impact,Math.abs(vx));
            x = b.maxX;
            vx = -Math.abs(vx)*bounce;
            angularVelocity -= .7;
            hit = true;
          }

          if(y <= 0){
            impact = Math.max(impact,Math.abs(vy));
            y = 0;
            vy = Math.abs(vy)*bounce;
            angularVelocity += vx*.08;
            hit = true;
          }else if(y >= b.maxY){
            impact = Math.max(impact,Math.abs(vy));
            y = b.maxY;
            vy = -Math.abs(vy)*bounce;
            angularVelocity -= vx*.08;
            hit = true;
          }

          vx *= friction;
          vy *= friction;
          angularVelocity *= angularFriction;

          if(hit && impact > 2.5){
            lightOn();
            sparks(Math.min(12,Math.round(impact+4)));
            scheduleLightOff(680);
          }

          render();

          if(Math.hypot(vx,vy)>.07 || Math.abs(angularVelocity)>.05){
            animationId = requestAnimationFrame(step);
          }else{
            vx = 0;
            vy = 0;
            angularVelocity = 0;
            scheduleLightOff(500);
          }
        }

        animationId = requestAnimationFrame(step);
      }

      function begin(event){
        event.preventDefault();
        dragging = true;
        pointerId = event.pointerId;
        bulb.setPointerCapture?.(pointerId);
        cancelAnimationFrame(animationId);

        const bulbRect = bulb.getBoundingClientRect();
        grabX = event.clientX - bulbRect.left;
        grabY = event.clientY - bulbRect.top;

        lastX = event.clientX;
        lastY = event.clientY;
        lastT = performance.now();

        vx = 0;
        vy = 0;
        angularVelocity = 0;

        lightOn();
        sparks(5);
      }

      function move(event){
        if(!dragging || event.pointerId !== pointerId) return;

        const boxRect = box.getBoundingClientRect();
        const b = bounds();
        const now = performance.now();
        const dt = Math.max(8,now-lastT);

        const nextX = clamp(event.clientX-boxRect.left-grabX,0,b.maxX);
        const nextY = clamp(event.clientY-boxRect.top-grabY,0,b.maxY);

        vx = (event.clientX-lastX)/(dt/16.67);
        vy = (event.clientY-lastY)/(dt/16.67);
        angularVelocity = clamp(vx*.18,-3.8,3.8);

        x = nextX;
        y = nextY;
        rotation = clamp(rotation+vx*.16,-18,18);

        lastX = event.clientX;
        lastY = event.clientY;
        lastT = now;

        lightOn();
        render();
      }

      function release(event){
        if(!dragging || event.pointerId !== pointerId) return;

        dragging = false;

        try{
          bulb.releasePointerCapture?.(pointerId);
        }catch{}

        pointerId = null;
        scheduleLightOff(900);
        startInertia();
      }

      bulb.addEventListener("pointerdown",begin);
      bulb.addEventListener("pointermove",move);
      bulb.addEventListener("pointerup",release);
      bulb.addEventListener("pointercancel",release);

      bulb.addEventListener("keydown",event => {
        const step = 14;
        const b = bounds();
        let handled = true;

        if(event.key === "ArrowLeft") x = clamp(x-step,0,b.maxX);
        else if(event.key === "ArrowRight") x = clamp(x+step,0,b.maxX);
        else if(event.key === "ArrowUp") y = clamp(y-step,0,b.maxY);
        else if(event.key === "ArrowDown") y = clamp(y+step,0,b.maxY);
        else if(event.key === "Enter" || event.key === " "){
          lightOn();
          sparks(7);
          scheduleLightOff(800);
        }else{
          handled = false;
        }

        if(handled){
          event.preventDefault();
          lightOn();
          render();
          scheduleLightOff(800);
        }
      });

      document.addEventListener("visibilitychange",() => {
        visible = !document.hidden;

        if(!visible){
          cancelAnimationFrame(animationId);
        }else if(!dragging && (Math.hypot(vx,vy)>.07 || Math.abs(angularVelocity)>.05)){
          startInertia();
        }
      });

      if("ResizeObserver" in window){
        new ResizeObserver(() => {
          const b = bounds();
          x = clamp(x,0,b.maxX);
          y = clamp(y,0,b.maxY);
          render();
        }).observe(box);
      }else{
        window.addEventListener("resize",() => {
          const b = bounds();
          x = clamp(x,0,b.maxX);
          y = clamp(y,0,b.maxY);
          render();
        });
      }

      render();
    })();
  </script>
</body>
</html>
