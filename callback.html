<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <title>Conectando Spotify de Yhorbis…</title>

  <style>
    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
      background:#09060d;
      color:#f8f5fc;
      font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }

    main{
      width:min(520px,100%);
      padding:38px;
      border:1px solid rgba(198,150,255,.22);
      border-radius:28px;
      text-align:center;
      background:linear-gradient(145deg,rgba(28,15,39,.95),rgba(10,7,14,.95));
      box-shadow:0 24px 70px rgba(0,0,0,.5),0 0 35px rgba(168,85,247,.12);
    }

    .orb{
      width:80px;
      height:80px;
      margin:0 auto 24px;
      border:1px solid rgba(224,196,255,.35);
      border-radius:50%;
      background:
        radial-gradient(circle at 35% 28%,rgba(255,255,255,.25),transparent 25%),
        rgba(168,85,247,.15);
      box-shadow:0 0 30px rgba(168,85,247,.25);
      animation:pulse 1.7s ease-in-out infinite;
    }

    h1{
      margin:0;
      font-size:clamp(1.7rem,6vw,2.5rem);
      letter-spacing:-.04em;
    }

    p{
      color:#a49aad;
      line-height:1.65;
    }

    a{color:#e0c4ff}

    @keyframes pulse{
      50%{
        transform:scale(1.08);
        box-shadow:0 0 46px rgba(168,85,247,.38);
      }
    }
  </style>
</head>

<body>
  <main>
    <div class="orb"></div>
    <h1 id="title">Terminando la conexión de Yhorbis…</h1>
    <p id="message">Esta ventana se cerrará automáticamente.</p>
  </main>

  <script>
    const APP_ORIGIN = "https://pwbzk8zz5j-sudo.github.io";
    const params = new URLSearchParams(window.location.search);

    const payload = {
      type: "yhorbis_spotify_callback",
      code: params.get("code"),
      state: params.get("state"),
      error: params.get("error")
    };

    const title = document.getElementById("title");
    const message = document.getElementById("message");

    function showFallback() {
      title.textContent = payload.error
        ? "No se pudo conectar."
        : "Regresa a Notion.";

      message.innerHTML = payload.error
        ? "Spotify canceló o rechazó la conexión. Puedes cerrar esta ventana."
        : "No encontramos la ventana del widget. Ciérrala y vuelve a pulsar Conectar Spotify desde Notion.";
    }

    if (window.opener && !window.opener.closed) {
      try {
        window.opener.postMessage(payload, APP_ORIGIN);

        title.textContent = payload.error
          ? "Conexión cancelada."
          : "¡Spotify de Yhorbis conectado!";

        message.textContent = payload.error
          ? "Puedes cerrar esta ventana."
          : "Volviendo al widget…";

        setTimeout(() => window.close(), 700);
      } catch (error) {
        console.error(error);
        showFallback();
      }
    } else {
      showFallback();
    }
  </script>
</body>
</html>
