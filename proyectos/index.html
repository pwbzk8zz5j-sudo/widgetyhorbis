<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Recordatorio de proyectos</title>
<style>
:root{
--bg:#0b0a0f;--panel:#15131c;--text:#f6f3fb;--muted:#8f889d;
--purple:#a855f7;--purple2:#7c3aed;--soft:#d8b4fe;
--border:rgba(255,255,255,.08);
}
*{box-sizing:border-box}
body{
margin:0;
padding:8px;
font-family:Inter,system-ui,sans-serif;
background:transparent;
display:grid;
place-items:center;
color:var(--text);
}
.widget{
width:min(100%,980px);
padding:18px 22px;
border-radius:22px;
border:1px solid var(--border);
background:
radial-gradient(circle at 92% 10%,rgba(168,85,247,.18),transparent 28%),
linear-gradient(145deg,var(--panel),var(--bg));
box-shadow:0 16px 40px rgba(0,0,0,.28);
}
.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:16px;
gap:16px;
}
.header h1{
margin:0;
font-size:20px;
font-weight:800;
letter-spacing:-.03em;
}
.done{
border:none;
border-radius:12px;
padding:10px 16px;
font-weight:800;
cursor:pointer;
color:white;
background:linear-gradient(135deg,var(--purple2),var(--purple));
}
.row{
display:grid;
grid-template-columns:72px 1fr;
gap:28px;
align-items:center;
}
.clapper{
width:64px;
height:64px;
cursor:pointer;
}
.note-wrapper{
display:flex;
flex-direction:column;
justify-content:center;
min-height:72px;
}
.note{
font-size:17px;
font-weight:700;
line-height:1.5;
letter-spacing:-.02em;
color:#fff;
max-width:620px;
transition:.18s;
}
.note strong{
color:var(--soft);
font-weight:800;
}
.hint{
margin-top:10px;
font-size:11px;
color:var(--muted);
}
.toast{
margin-top:8px;
font-size:11px;
color:var(--soft);
opacity:0;
transition:.25s;
}
.toast.show{opacity:1;}
</style>
</head>
<body>
<div class="widget">
<div class="header">
<h1>Actualiza tus proyectos</h1>
<button id="done" class="done">✓ Ya actualicé</button>
</div>

<div class="row">
<svg id="clapper" class="clapper" viewBox="0 0 64 64">
<rect x="12" y="26" width="40" height="24" rx="5" fill="#221d2c" stroke="#6b4aa8"/>
<rect x="10" y="12" width="44" height="12" rx="3" fill="#d9d2e9"/>
<path d="M10 12h44M18 12l8 12M34 12l8 12M50 12l4 6" stroke="#222" stroke-width="2"/>
</svg>

<div class="note-wrapper">
<div id="msg" class="note">
Antes de irte, <strong>actualiza el estado</strong> y deja escrito el <strong>siguiente paso</strong>.
</div>

<div class="hint">
Haz clic en la claqueta para ver otro recordatorio.
</div>

<div id="toast" class="toast">
✨ El Yhorbis del futuro te lo agradecerá.
</div>
</div>
</div>
</div>

<script>
const messages=[
'Antes de irte, <strong>actualiza el estado</strong> y deja escrito el <strong>siguiente paso</strong>.',
'¿Ya cambió de etapa? Que también cambie en <strong>Notion</strong>.',
'Deja un <strong>siguiente paso</strong> que puedas empezar en menos de cinco minutos.',
'Una idea escrita vale más que una idea olvidada.',
'Actualizar el estado toma cinco segundos y evita mucho caos.',
'No hace falta terminarlo hoy. Solo deja claro <strong>qué sigue</strong>.'
];
let last=-1;
const msg=document.getElementById("msg");
const clap=document.getElementById("clapper");
const done=document.getElementById("done");
const toast=document.getElementById("toast");

function change(){
 let i;
 do{i=Math.floor(Math.random()*messages.length);}while(i===last);
 last=i;
 msg.style.opacity=.25;
 setTimeout(()=>{
   msg.innerHTML=messages[i];
   msg.style.opacity=1;
 },120);

 clap.animate([
  {transform:"rotate(0deg)"},
  {transform:"rotate(-12deg)"},
  {transform:"rotate(2deg)"},
  {transform:"rotate(0deg)"}
 ],{duration:420});
}
clap.onclick=change;

done.onclick=()=>{
 localStorage.setItem("last_project_update",new Date().toISOString());
 toast.classList.add("show");
 setTimeout(()=>toast.classList.remove("show"),2500);
}
</script>
</body>
</html>
