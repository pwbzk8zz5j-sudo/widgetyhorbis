<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Actualiza tus proyectos</title>

  <style>
    :root{
      --bg:#0b0a0f;
      --panel:#15131c;
      --text:#f6f3fb;
      --muted:#aaa2b8;
      --purple:#a855f7;
      --purple-2:#7c3aed;
      --purple-soft:#d8b4fe;
      --border:rgba(255,255,255,.09);
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      min-height:100%;
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:transparent;
      color:var(--text);
    }

    body{
      padding:10px;
      display:grid;
      place-items:center;
    }

    .widget{
      position:relative;
      width:min(100%,720px);
      min-height:390px;
      padding:26px;
      border:1px solid var(--border);
      border-radius:28px;
      overflow:hidden;
      background:
        radial-gradient(circle at 86% 12%, rgba(168,85,247,.22), transparent 30%),
        radial-gradient(circle at 12% 90%, rgba(124,58,237,.13), transparent 30%),
        linear-gradient(145deg,var(--panel),var(--bg));
      box-shadow:0 18px 50px rgba(0,0,0,.32);
      display:grid;
      place-items:center;
      text-align:center;
    }

    .glow{
      position:absolute;
      width:220px;
      height:220px;
      border-radius:50%;
      background:rgba(168,85,247,.12);
      filter:blur(35px);
      pointer-events:none;
      animation:breathe 4s ease-in-out infinite;
    }

    .content{
      position:relative;
      z-index:2;
      width:min(100%,520px);
    }

    .eyebrow{
      color:var(--purple-soft);
      font-size:12px;
      font-weight:850;
      text-transform:uppercase;
      letter-spacing:.12em;
      margin-bottom:14px;
    }

    .clapper-wrap{
      width:138px;
      height:122px;
      margin:0 auto 18px;
      position:relative;
      cursor:pointer;
      user-select:none;
      touch-action:manipulation;
      filter:drop-shadow(0 18px 26px rgba(0,0,0,.28));
    }

    .clapper{
      position:absolute;
      inset:0;
      transform-origin:32px 60px;
    }

    .clapper.clack{
      animation:clack .55s cubic-bezier(.2,.8,.2,1);
    }

    .top{
      position:absolute;
      left:16px;
      top:6px;
      width:108px;
      height:28px;
      border-radius:8px 8px 4px 4px;
      background:linear-gradient(135deg,#eee8f8,#bda9d7);
      border:1px solid rgba(255,255,255,.28);
      transform:rotate(-8deg);
      transform-origin:16px 24px;
      overflow:hidden;
    }

    .top::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        repeating-linear-gradient(
          135deg,
          rgba(20,17,27,.92) 0 15px,
          transparent 15px 29px
        );
    }

    .body{
      position:absolute;
      left:19px;
      top:45px;
      width:102px;
      height:67px;
      border-radius:8px 8px 14px 14px;
      background:
        linear-gradient(145deg,rgba(168,85,247,.35),rgba(124,58,237,.15)),
        #1c1825;
      border:1px solid rgba(216,180,254,.22);
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.025);
    }

    .body::before,
    .body::after{
      content:"";
      position:absolute;
      left:12px;
      right:12px;
      height:2px;
      background:rgba(216,180,254,.18);
    }

    .body::before{top:22px}
    .body::after{top:42px}

    .dot{
      position:absolute;
      width:10px;
      height:10px;
      border-radius:50%;
      background:var(--purple-soft);
      box-shadow:0 0 18px rgba(216,180,254,.8);
      right:28px;
      bottom:19px;
      opacity:.78;
    }

    h1{
      margin:0;
      font-size:clamp(28px,5vw,44px);
      line-height:1.05;
      letter-spacing:-.04em;
    }

    .message{
      min-height:50px;
      margin:14px auto 0;
      max-width:480px;
      color:var(--muted);
      font-size:16px;
      line-height:1.5;
      transition:opacity .2s ease, transform .2s ease;
    }

    .message.switching{
      opacity:0;
      transform:translateY(5px);
    }

    .button{
      margin-top:20px;
      appearance:none;
      border:none;
      border-radius:15px;
      padding:13px 18px;
      font-size:14px;
      font-weight:850;
      color:white;
      cursor:pointer;
      background:linear-gradient(135deg,var(--purple-2),var(--purple));
      box-shadow:0 12px 28px rgba(124,58,237,.24);
      transition:transform .18s ease, box-shadow .18s ease;
    }

    .button:hover{
      transform:translateY(-2px);
      box-shadow:0 16px 34px rgba(124,58,237,.3);
    }

    .button:active{transform:translateY(0) scale(.98)}

    .hint{
      margin-top:12px;
      font-size:12px;
      color:rgba(216,180,254,.62);
    }

    .particle{
      position:absolute;
      z-index:4;
      width:6px;
      height:6px;
      border-radius:50%;
      background:var(--purple-soft);
      pointer-events:none;
      animation:spark .8s ease-out forwards;
      box-shadow:0 0 12px rgba(216,180,254,.8);
    }

    .toast{
      position:absolute;
      left:50%;
      bottom:18px;
      transform:translate(-50%,12px);
      padding:9px 13px;
      border-radius:999px;
      background:rgba(22,18,31,.88);
      border:1px solid rgba(216,180,254,.17);
      color:var(--purple-soft);
      font-size:12px;
      font-weight:750;
      opacity:0;
      pointer-events:none;
      transition:opacity .25s ease, transform .25s ease;
      backdrop-filter:blur(12px);
    }

    .toast.visible{
      opacity:1;
      transform:translate(-50%,0);
    }

    @keyframes clack{
      0%{transform:rotate(0)}
      35%{transform:rotate(-17deg)}
      62%{transform:rotate(2deg)}
      100%{transform:rotate(0)}
    }

    @keyframes breathe{
      0%,100%{transform:scale(.92);opacity:.65}
      50%{transform:scale(1.08);opacity:1}
    }

    @keyframes spark{
      from{
        opacity:1;
        transform:translate(0,0) scale(1);
      }
      to{
        opacity:0;
        transform:translate(var(--x),var(--y)) scale(.2);
      }
    }

    @media(max-width:520px){
      body{padding:6px}

      .widget{
        min-height:360px;
        padding:22px 16px;
        border-radius:22px;
      }

      .clapper-wrap{
        transform:scale(.92);
        margin-bottom:10px;
      }

      .message{
        font-size:15px;
      }

      .button{
        width:100%;
      }
    }

    @media(prefers-reduced-motion:reduce){
      *,*::before,*::after{
        animation-duration:.001ms !important;
        animation-iteration-count:1 !important;
        scroll-behavior:auto !important;
      }
    }
  </style>
</head>

<body>
  <main class="widget" id="widget">
    <div class="glow"></div>

    <div class="content">
      <div class="eyebrow">🎬 Proyectos</div>

      <div class="clapper-wrap" id="clapperButton" role="button" tabindex="0" aria-label="Activar recordatorio">
        <div class="clapper" id="clapper">
          <div class="top"></div>
          <div class="body">
            <div class="dot"></div>
          </div>
        </div>
      </div>

      <h1>¿En qué va tu proyecto?</h1>

      <div class="message" id="message">
        Antes de irte, actualiza el estado y deja escrito el siguiente paso.
      </div>

      <button class="button" id="doneButton" type="button">
        Ya actualicé ✨
      </button>

      <div class="hint">Toca la claqueta para otro recordatorio.</div>
    </div>

    <div class="toast" id="toast">Buen trabajo. El Yhorbis del futuro te lo agradece.</div>
  </main>

  <script>
    const messages = [
      "Antes de irte, actualiza el estado y deja escrito el siguiente paso.",
      "¿Ya cambió de etapa? Que también cambie en Notion.",
      "Tu siguiente paso debe ser algo concreto y fácil de empezar.",
      "¿Se te ocurrió una idea? Guárdala dentro del proyecto antes de olvidarla.",
      "Actualizar el estado toma cinco segundos y evita mucha confusión después.",
      "No necesitas organizarlo todo. Solo deja claro qué sigue.",
      "El proyecto no está perdido: quizá solo le falta actualizar el estado.",
      "Una idea escrita vale más que una idea perfecta que se olvidó."
    ];

    const lateMessages = [
      "Ya es tarde. Actualiza el estado y deja que mañana empiece más fácil.",
      "Cierre rápido: estado, siguiente paso y a descansar.",
      "No hace falta terminarlo hoy. Solo deja claro por dónde continuar mañana."
    ];

    const widget = document.getElementById("widget");
    const clapperButton = document.getElementById("clapperButton");
    const clapper = document.getElementById("clapper");
    const message = document.getElementById("message");
    const doneButton = document.getElementById("doneButton");
    const toast = document.getElementById("toast");

    let clickCount = Number(localStorage.getItem("clapper_click_count") || 0);
    let lastIndex = -1;

    function chooseMessage(){
      const hour = new Date().getHours();
      const pool = hour >= 22 || hour < 5
        ? [...messages, ...lateMessages, ...lateMessages]
        : messages;

      let index;
      do{
        index = Math.floor(Math.random() * pool.length);
      }while(index === lastIndex && pool.length > 1);

      lastIndex = index;
      return pool[index];
    }

    function animateClapper(){
      clapper.classList.remove("clack");
      void clapper.offsetWidth;
      clapper.classList.add("clack");
      createParticles();

      clickCount += 1;
      localStorage.setItem("clapper_click_count", clickCount);

      message.classList.add("switching");

      setTimeout(() => {
        if(clickCount % 7 === 0){
          message.textContent = "Está bonito hacer clic… pero acuérdate de actualizar Notion 😌";
        }else{
          message.textContent = chooseMessage();
        }

        message.classList.remove("switching");
      }, 170);
    }

    function createParticles(){
      const box = clapperButton.getBoundingClientRect();
      const widgetBox = widget.getBoundingClientRect();
      const centerX = box.left - widgetBox.left + box.width / 2;
      const centerY = box.top - widgetBox.top + box.height / 2;

      for(let i = 0; i < 16; i++){
        const particle = document.createElement("span");
        particle.className = "particle";

        const angle = Math.random() * Math.PI * 2;
        const distance = 45 + Math.random() * 65;

        particle.style.left = centerX + "px";
        particle.style.top = centerY + "px";
        particle.style.setProperty("--x", Math.cos(angle) * distance + "px");
        particle.style.setProperty("--y", Math.sin(angle) * distance + "px");

        widget.appendChild(particle);
        setTimeout(() => particle.remove(), 900);
      }
    }

    function showToast(){
      animateClapper();
      toast.classList.add("visible");
      doneButton.textContent = "Listo por hoy ✓";

      localStorage.setItem("last_project_update", new Date().toISOString());

      setTimeout(() => {
        toast.classList.remove("visible");
      }, 2600);

      setTimeout(() => {
        doneButton.textContent = "Ya actualicé ✨";
      }, 3200);
    }

    function checkLastUpdate(){
      const saved = localStorage.getItem("last_project_update");
      if(!saved) return;

      const diff = Date.now() - new Date(saved).getTime();
      const days = diff / 86400000;

      if(days >= 3){
        message.textContent = "🤨 Sospecho que hay proyectos esperando una actualización.";
      }
    }

    clapperButton.addEventListener("click", animateClapper);

    clapperButton.addEventListener("keydown", event => {
      if(event.key === "Enter" || event.key === " "){
        event.preventDefault();
        animateClapper();
      }
    });

    doneButton.addEventListener("click", showToast);

    checkLastUpdate();
  </script>
</body>
</html>
